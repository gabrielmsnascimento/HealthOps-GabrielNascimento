async function ensurePdfJs(){
  if(window.pdfjsLib) return window.pdfjsLib;
  await new Promise((resolve,reject)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';s.onload=resolve;s.onerror=reject;document.head.appendChild(s)});
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  return window.pdfjsLib;
}
async function readFile(ev){
  const file=ev.target.files[0]; if(!file)return;
  const rawBox=document.getElementById('raw');
  rawBox.value='Lendo arquivo...';
  try{
    if(file.type==='application/pdf' || file.name.toLowerCase().endsWith('.pdf')){
      const pdfjs=await ensurePdfJs();
      const buf=await file.arrayBuffer();
      const pdf=await pdfjs.getDocument({data:buf}).promise;
      const pages=[];
      for(let i=1;i<=pdf.numPages;i++){
        const page=await pdf.getPage(i);
        const content=await page.getTextContent();
        // IFN/iFlight Neo pode vir como texto em fluxo, não como linhas visuais.
        // Ordenar por coordenadas embaralha alguns PDFs em colunas (ex.: maio/2026).
        // Por isso, primeiro usamos a ordem nativa do PDF.js + hasEOL.
        let streamLines=[];
        let line='';
        for(const it of content.items){
          const piece=String(it.str||'').trim();
          if(piece){ line+=(line?' ':'')+piece; }
          if(it.hasEOL){
            if(line.trim()) streamLines.push(line.replace(/\s+/g,' ').trim());
            line='';
          }
        }
        if(line.trim()) streamLines.push(line.replace(/\s+/g,' ').trim());
        let pageText=streamLines.join('\n');

        // Fallback por coordenadas apenas quando a ordem nativa não trouxer sinais de escala.
        if(!/\d{2}-[A-Z][a-z]{2}-\d{4}|\bLA\d{4}\b|\bDO\b|\bHSB\b|\bVC\b/.test(pageText)){
          const items=content.items
            .filter(it=>String(it.str||'').trim())
            .map(it=>({str:String(it.str||'').trim(),x:it.transform[4],y:it.transform[5]}))
            .sort((a,b)=>Math.abs(b.y-a.y)>3 ? b.y-a.y : a.x-b.x);
          const rows=[];
          for(const it of items){
            let row=rows.find(r=>Math.abs(r.y-it.y)<=3);
            if(!row){row={y:it.y,items:[]}; rows.push(row)}
            row.items.push(it);
          }
          rows.sort((a,b)=>b.y-a.y);
          pageText=rows.map(r=>r.items.sort((a,b)=>a.x-b.x).map(i=>i.str).join(' ').replace(/\s+/g,' ').trim()).filter(Boolean).join('\n');
        }
        pages.push(pageText);
      }
      const text=pages.join('\n');
      rawBox.value=text;
      if(!/Roster Report|\d{2}-[A-Z][a-z]{2}-\d{4}|\bLA\d{4}\b|\bDO\b|\bHSB/.test(text)){
        alert('PDF lido, mas o texto extraído não parece uma escala IFN. Tente copiar/colar o texto ou enviar outro formato.');
      }
    }else{
      rawBox.value=await file.text();
    }
  }catch(err){
    console.error(err);
    rawBox.value='';
    alert('Não consegui extrair texto deste PDF no navegador. Tente atualizar a página, limpar cache do PWA ou copiar/colar o texto da escala.');
  }
}


window.processRaw=function(){
  const raw=document.getElementById('raw').value||'';
  if(raw.trim().startsWith('%PDF-') || raw.includes('/Type/Pages') || raw.includes('endobj')){
    alert('O conteúdo carregado é o binário do PDF, não o texto da escala. Selecione novamente o PDF nesta versão ou copie/cole o texto extraído.');
    return;
  }
  const roster=parseRoster(raw);
  if(!Object.keys(roster.days||{}).length){
    alert('Nenhum dia foi processado. Verifique se o texto contém linhas como 01-May-2026, DO, HSB ou voos LAxxxx.');
    return;
  }
  const mode=document.getElementById('importMode')?.value||state.importMode||'planned';
  roster.importMode=mode;
  const key=roster.key;
  const existing=state.rosters[key];
  if(existing){
    existing.versions=existing.versions||[];
    existing.versions.push({createdAt:existing.createdAt,mode:existing.importMode||'planned',days:existing.days,raw:existing.raw,period:existing.period,parser:existing.parser});
    if(mode==='executed'){
      existing.executed={createdAt:new Date().toISOString(),days:roster.days,raw:roster.raw,period:roster.period,parser:roster.parser};
      existing.days=roster.days;
      existing.raw=roster.raw;
      existing.debug=roster.debug;
      existing.importMode='executed';
      state.rosters[key]=existing;
    }else{
      state.rosters[key]=roster;
    }
  }else{
    state.rosters[key]=roster;
  }
  state.activeRosterKey=key;
  const dates=Object.keys(state.rosters[key].days||{}).sort();
  if(dates[0]){state.selected=dates.includes(iso(new Date()))?iso(new Date()):dates[0];state.calendarMonth=monthKey(state.selected)}
  render();
};
window.clearRoster=function(){if(state.activeRosterKey)delete state.rosters[state.activeRosterKey];state.activeRosterKey=Object.keys(state.rosters)[0]||null;render()}
window.clearInvalidRosters=function(){Object.keys(state.rosters).forEach(k=>{const r=state.rosters[k]; if(!r || !r.days || !Object.keys(r.days).length || (r.raw||'').startsWith('%PDF-')) delete state.rosters[k];}); state.activeRosterKey=Object.keys(state.rosters)[0]||null; render();}

function parseRoster(raw){
  const original=String(raw||'');
  const text=normalizeRosterText(original);
  let debug=[], stats={blocks:0,events:0,ignored:0,unparsed:0};
  const head=text.match(/Roster Report\s+(\d{2})-(\w{3})-(\d{4})\s*to\s*(\d{2})-(\w{3})-(\d{4})/i)
    || text.match(/(\d{2})-(\w{3})-(\d{4})\s*to\s*(\d{2})-(\w{3})-(\d{4})/i)
    || text.match(/(\d{2})-(\w{3})-(\d{4})to(\d{2})-(\w{3})-(\d{4})/i);
  let period='Escala importada', key='Import '+new Date().toISOString().slice(0,16), reportStart=null, reportEnd=null;
  if(head){
    reportStart=`${head[3]}-${pad(MONTHS[head[2]]+1)}-${head[1]}`;
    reportEnd=`${head[6]}-${pad(MONTHS[head[5]]+1)}-${head[4]}`;
    key=`${head[3]}-${pad(MONTHS[head[2]]+1)}`;
    period=`${reportStart} a ${reportEnd}`;
  }
  const blocks=buildRosterBlocks(text, reportStart, reportEnd, debug, stats);
  const days={};
  for(const block of blocks){
    const events=parseEventsFromBlock(block.date, block.text, debug);
    if(!events.length){stats.unparsed++; debug.push(`SEM EVENTO: ${block.date} | ${block.text.slice(0,160)}`); continue;}
    for(const ev of events){
      if(reportStart && ev.date<reportStart){stats.ignored++; continue;}
      if(reportEnd && ev.date>=reportEnd && ev.code!=='LA3497'){ /* evita herança do mês seguinte na maioria dos relatórios */ }
      if(!days[ev.date]) days[ev.date]={date:ev.date,events:[],classification:'Sem dados',duty:0,flight:0,fatigue:0,issues:[]};
      days[ev.date].events.push(ev); stats.events++;
      debug.push(`${ev.date}: ${ev.code} -> ${ev.type} | duty=${ev.duty||0} flight=${ev.flight||0} | ${ev.source||''}`);
    }
    stats.blocks++;
  }
  Object.values(days).forEach(d=>finalizeDay(d));
  debug.unshift(`Parser IFN v4: ${stats.events} eventos em ${Object.keys(days).length} dias. Blocos: ${stats.blocks}. Não processados: ${stats.unparsed}. Ignorados: ${stats.ignored}.`);
  return{key,period,raw:text,days,debug,createdAt:new Date().toISOString(),parser:'IFN-v4'};
}
function normalizeRosterText(raw){
  return String(raw||'')
    .replace(/[\u000c\ufffe]/g,' ')
    .replace(/[←⇐]/g,'<==')
    .replace(/\r/g,'\n')
    .replace(/(\d{2})-(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)-(\d{4})\s*to\s*(\d{2})-/ig,'$1-$2-$3 to $4-')
    .replace(/(\d{2})-(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)-(\d{4})to(\d{2})-/ig,'$1-$2-$3 to $4-')
    .replace(/(HSB|HSBE|ASB|CRMBSB|R320|CBF|EMER|MCK|C32F)\s*-\s*/ig,'$1-')
    .replace(/\n{3,}/g,'\n\n');
}
function buildRosterBlocks(text, reportStart, reportEnd, debug, stats){
  const lines=text.split(/\n+/).map(x=>x.replace(/\s+/g,' ').trim()).filter(Boolean);
  const blocks=[]; let current=null; let ignoreContinuation=false;
  const dateRe=/\b(\d{2})-(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)-(\d{4})\b/i;
  for(let line of lines){
    if(/^Date\b|^Pairing\/Activity\b|^LEGEND\b|^Filial\b/i.test(line)){ignoreContinuation=true; continue;}
    if(/^Roster Report\b/i.test(line) || (/\bto\b/i.test(line)&&dateRe.test(line)&&!/\b(LA\d{4}|DO|DR|VC|HSB|HSBE|ASB|R320|CBF|EMER|CRMBSB|MCK|C32F)\b/i.test(line))){
      continue;
    }
    if(/^<==/.test(line)){ ignoreContinuation=true; stats.ignored++; debug.push(`IGNORADO continuação anterior: ${line.slice(0,120)}`); continue; }
    const dm=line.match(dateRe);
    // O PDF às vezes solta o código do pareamento em uma linha antes da data real.
    // Ex.: "LA3866/070426/" sozinho antes de "07-Apr-2026 ...". Não anexar ao dia anterior.
    // Se a própria linha já contém uma data real, ela será processada normalmente.
    if(!dm && /^(LA\d{4}|HSB|HSBE|ASB|ASB\d?|MCK|C32F)[-\s\/].*\/\d{6}\//i.test(line) && !/\b(OP|PS)\b/i.test(line)){
      stats.ignored++; debug.push(`IGNORADO cabeçalho de pareamento isolado: ${line.slice(0,120)}`); continue;
    }
    if(dm){
      ignoreContinuation=false;
      if(current) blocks.push(current);
      const date=`${dm[3]}-${pad(MONTHS[dm[2]]+1)}-${dm[1]}`;
      let rest=line.slice(dm.index+dm[0].length).trim();
      rest=rest.replace(/^(Mon|Tue|Wed|Thu|Fri|Sat|Sun)\b/i,'').trim();
      current={date,text:rest};
    }else if(current && !ignoreContinuation){
      current.text+=' '+line;
    }else{
      stats.ignored++;
    }
  }
  if(current) blocks.push(current);
  return blocks.filter(b=>!reportStart || b.date>=reportStart).filter(b=>!reportEnd || b.date<=reportEnd);
}
function parseEventsFromBlock(baseDate,blockText,debug){
  const text=blockText.replace(/\s+/g,' ').trim();
  if(!text)return[];
  const act=text.match(/\b(VC|DO|DR|HSBE|HSB|ASB\d?|CRMBSB|R320|CBF|EMER|MCK|C32F)\b/i);
  const hasFlight=/\bLA\d{4}\b/.test(text);
  if(act && (!hasFlight || !/\bLA\d{4}\b\s+(OP|PS)\b/i.test(text))){
    const code=act[1].toUpperCase(); const times=extractTimes(text); const duty=activityDuty(code,times);
    const type=(code==='DO'||code==='DR')?'rest':code==='VC'?'vacation':code.startsWith('HSB')?'standby':code.startsWith('ASB')?'reserve':'training';
    return[{code,type,duty,flight:0,times:times.map(t=>t.label),date:baseDate,absStart:times[0]?.abs,absEnd:times[times.length-1]?.abs,source:text.slice(0,150)}];
  }
  const events=[];
  // Captura linhas/trechos de voo no formato: LA#### OP/PS ORG HH:MM DST HH:MM ... FH
  const flightRe=/\b(LA\d{4})\b\s+(OP|PS)?\s*([A-Z]{3})\s+(\d{2}:\d{2})(?:\(\+(\d)\))?\s+([A-Z]{3})\s+(\d{2}:\d{2})(?:\(\+(\d)\))?(?:\s+(\d{2}:\d{2})(?:\(\+(\d)\))?)?(?:\s+(\d{2}:\d{2}))?/g;
  let m; let lastFlightEnd=0;
  while((m=flightRe.exec(text))){
    const code=m[1], role=m[2]||'';
    const prefix=text.slice(lastFlightEnd,m.index); const pTimes=extractTimes(prefix); const rep=pTimes[pTimes.length-1]||null;
    const depTime=m[4], depOff=+(m[5]||0), arrTime=m[7], arrOff=+(m[8]||0);
    const depAbs=absMinutes(baseDate,depTime,depOff); let arrAbs=absMinutes(baseDate,arrTime,arrOff); if(arrAbs<depAbs)arrAbs+=1440;
    let fh=round((arrAbs-depAbs)/60);
    // Nas tabelas IFN, depois do horário de chegada pode vir FH e/ou DH.
    // Se o primeiro HH:MM após chegada é pequeno (ex. 00:50, 03:25), tratamos como FH.
    // Se for um horário de debrief (ex. 17:30), tentamos o próximo campo pequeno.
    const c1=m[9], c2=m[11];
    if(c1 && isDurationHH(c1) && c1!=='00:00') fh=timeToHours(c1);
    else if(c2 && isDurationHH(c2) && c2!=='00:00') fh=timeToHours(c2);
    const date=isoFromAbs(baseDate,depAbs);
    events.push({code,op:role,type:'flight',duty:0,flight:fh,times:[depTime+(depOff?`(+${depOff})`:''),arrTime+(arrOff?`(+${arrOff})`:'')],absStart:depAbs,absEnd:arrAbs,reportTime:rep?rep.label:null,reportAbs:rep?absMinutes(baseDate,rep.time,rep.offset):null,date,source:`${code} ${role} ${m[3]} ${depTime} ${m[6]} ${arrTime}`});
    lastFlightEnd=flightRe.lastIndex;
  }
  if(events.length)return events;
  // Fallback para trechos onde a ordem visual do PDF separou origem/destino: usa janelas ao redor do código.
  const codeRe=/\b(LA\d{4})\b/g; let cm;
  while((cm=codeRe.exec(text))){
    const slice=text.slice(Math.max(0,cm.index-35), Math.min(text.length, cm.index+140));
    const times=extractTimes(slice); const aps=[...slice.matchAll(/\b[A-Z]{3}\b/g)].map(x=>x[0]).filter(x=>!['OP','PS','CC','THE'].includes(x));
    if(times.length>=2){
      const dep=times[0], arr=times[1]; let depAbs=absMinutes(baseDate,dep.time,dep.offset); let arrAbs=absMinutes(baseDate,arr.time,arr.offset); if(arrAbs<depAbs)arrAbs+=1440;
      events.push({code:cm[1],type:'flight',duty:0,flight:round((arrAbs-depAbs)/60),times:[dep.label,arr.label],absStart:depAbs,absEnd:arrAbs,date:isoFromAbs(baseDate,depAbs),source:`fallback ${slice}`});
    }
  }
  return events;
}
function extractTimes(line){const out=[];const re=/(\d{2}:\d{2})(?:\(\+(\d)\))?/g;let m;while((m=re.exec(line))){out.push({label:m[1]+(m[2]?`(+${m[2]})`:''),time:m[1],offset:+(m[2]||0),abs:absMinutes('2000-01-01',m[1],+(m[2]||0))});}return out;}
function timeToHours(t){const [h,m]=t.split(':').map(Number);return round(h+m/60)}
function isDurationHH(t){const [h,m]=t.split(':').map(Number);return h>=0 && h<=6 && m>=0 && m<60}
function activityDuty(code,times){
  if(code==='DO'||code==='DR'||code==='VC')return 0;
  if(code==='CBF'||code==='EMER')return 2;
  if(code==='R320'||code==='MCK'||code==='C32F'||code==='CRMBSB'){
    const last=times[times.length-1];
    if(last && isDurationHH(last.time) && times.length>=3) return timeToHours(last.time);
    return times.length>=2?round(Math.max(0,times[times.length-1].abs-times[0].abs)/60):4;
  }
  if(code.startsWith('HSB'))return times.length>=2?round(Math.max(0,times[times.length-1].abs-times[0].abs)/60):12;
  if(code.startsWith('ASB'))return times.length>=2?round(Math.max(0,times[times.length-1].abs-times[0].abs)/60):6;
  return 0;
}
function absMinutes(baseDate,time,off){const [h,m]=time.split(':').map(Number);return off*1440+h*60+m;}
function isoFromAbs(baseDate,mins){return addDays(baseDate,Math.floor(mins/1440));}
function maxOffset(line){let max=0; for(const m of line.matchAll(/\(\+(\d)\)/g)) max=Math.max(max,+m[1]); return max;}
function finalizeDay(d){
  const types=new Set(d.events.map(e=>e.type));
  if(types.has('flight'))d.classification='Voo'; else if(types.has('training'))d.classification='Treinamento'; else if(types.has('reserve')||types.has('standby'))d.classification='Reserva/Sobreaviso'; else if(types.has('rest'))d.classification='Folga regulamentar'; else if(types.has('vacation'))d.classification='Férias/VC'; else d.classification='Atividade';
  d.flight=round(sum(d.events.map(e=>e.flight||0)));
  const abs=d.events.filter(e=>Number.isFinite(e.absStart)&&Number.isFinite(e.absEnd));
  if(d.classification==='Voo' && abs.length){
    // Calcula por blocos: quebras > 10h indicam nova jornada no mesmo dia civil.
    const sorted=abs.slice().sort((a,b)=>a.absStart-b.absStart); let total=0, start=sorted[0].absStart, end=sorted[0].absEnd;
    for(let i=1;i<sorted.length;i++){ if(sorted[i].absStart-end>600){ total+=Math.max(0,end-start)/60+1; start=sorted[i].absStart; end=sorted[i].absEnd; } else end=Math.max(end,sorted[i].absEnd); }
    total+=Math.max(0,end-start)/60+1; d.duty=round(total);
  } else d.duty=round(sum(d.events.map(e=>e.duty||0)));
  if(d.classification==='Folga regulamentar'||d.classification==='Férias/VC')d.duty=0;
  const crosses=abs.some(e=>{const s=e.absStart%1440,en=e.absEnd%1440;return s<360||en<360||s>en;});
  d.fatigue=d.classification==='Voo'?(crosses?85:45):d.classification==='Folga regulamentar'?10:d.classification==='Férias/VC'?5:35;
}

function perDiemPaymentMap(){const map={};calcPerDiems().forEach(w=>{const [dd,mm]=w.pay.split('/');const y=w.start.slice(0,4);let pay=`${y}-${mm}-${dd}`;if(pay<w.start){pay=`${+y+1}-${mm}-${dd}`}map[pay]=w});return map}

function eventGlobalStart(e){const day=parseIso(e.date||state.selected).getTime()/60000;return day+(Number.isFinite(e.absStart)?(e.absStart%1440):0)}

function addHoursLabel(date,min,h){return minutesToLabel((min%1440)+h*60)}

function buildJourneys(month){
 const evs=Object.values(daysForMonth(month)).flatMap(d=>(d.events||[]).map(e=>({...e,date:e.date||d.date,dayClass:d.classification}))).sort((a,b)=>eventGlobalStart(a)-eventGlobalStart(b));
 const out=[];let cur=null;
 function close(){
  if(!cur)return;
  const first=cur.events[0];const report=reportForBlock(first);const reportMin=(+report.slice(0,2))*60+(+report.slice(3,5));
  const stages=cur.events.filter(e=>e.type==='flight').length;const limit=cur.type==='flight'?rbacSimpleLimitHours(reportMin,stages):null;
  const intl=cur.events.some(e=>/^LA8/.test(e.code||''));const debrief=intl?0.75:0.5;
  cur.report=report;cur.reportGlobal=parseIso(cur.date).getTime()/60000+reportMin;cur.international=intl;cur.debrief=debrief;

  cur.officialEnd=cur.end+(cur.type==='flight'?debrief*60:0);
  cur.duty=round(Math.max(0,cur.officialEnd-cur.reportGlobal)/60);
  if(!Number.isFinite(cur.duty)||cur.duty<=0)cur.duty=round(Math.max(0,cur.end-cur.start)/60 + (cur.type==='flight'?debrief:0));
  cur.flight=round(sum(cur.events.map(e=>e.flight||0)));cur.codes=[...new Set(cur.events.map(e=>e.code))];out.push(cur);cur=null
 }
 for(const e of evs){
  const s=eventGlobalStart(e), en=eventGlobalEnd(e);const type=e.type==='flight'?'flight':e.type==='training'?'training':(e.type==='rest'?'rest':(e.type==='vacation'?'vacation':'standby'));
  if(type==='rest'||type==='vacation')continue;
  if(type!=='flight'){close();out.push({date:e.date,type,label:e.dayClass||e.code,report:e.times&&e.times[0]||'—',reportGlobal:eventGlobalStart(e),officialEnd:eventGlobalEnd(e),limitCut:'—',limitEnd:'—',duty:round(e.duty||0),flight:0,codes:[e.code],recovery:null});continue}
  if(!cur){cur={date:e.date,type:'flight',label:'Jornada de voo',start:s,end:en,events:[e]};continue}

 }

function addRecoveryEstimates(journeys){
 for(let i=1;i<journeys.length;i++){
  const prev=journeys[i-1], cur=journeys[i];
  if(prev.type!=='flight'||cur.type!=='flight'||!Number.isFinite(prev.officialEnd)||!Number.isFinite(cur.reportGlobal)){cur.recovery=null;continue;}
  const firstFlight=cur.events.find(e=>e.type==='flight'); const dep=firstFlight?eventGlobalStart(firstFlight):cur.reportGlobal+50;
  const regulatoryRest=(cur.reportGlobal-prev.officialEnd)/60;
  const hotelMin=(dep-120-(prev.officialEnd+90))/60; // pior cenário: saída hotel 2h antes + chegada hotel 90min após fim da jornada
  const hotelMax=(dep-90-(prev.officialEnd+45))/60;  // melhor cenário: saída hotel 1h30 antes + chegada hotel 45min após fim da jornada
  const avg=(hotelMin+hotelMax)/2;

 }
}

function calcPerDiems(){const days=allDays();const res={};Object.entries(days).forEach(([date,d])=>{if(d.classification==='Folga regulamentar'||d.classification==='Férias/VC')return;const items=[];let main=0,breakfast=0,taxi=0,training=0;if(d.classification==='Treinamento'){training++;items.push('Treinamento*')}if(d.classification==='Voo'||d.classification==='Reserva/Sobreaviso'||d.classification==='Treinamento'){const startHour=firstHour(d);const outBase=hasOutBase(d);if(startHour!==null&&startHour>=5&&startHour<8&&d.classification==='Voo'&&!startsFromHotel(d)){breakfast++;items.push('Café')} if(outBase||d.classification==='Treinamento'||d.classification==='Reserva/Sobreaviso'){main++;items.push('Almoço'); if(d.classification==='Voo'&&crossesDinner(d)){main++;items.push('Jantar')} if(d.classification==='Voo'&&crossesSupper(d)){main++;items.push('Ceia')}} if(d.classification==='Voo'&&baseTaxi(d)){taxi++;items.push('Táxi')}}if(items.length)addWeek(date,{main,breakfast,taxi,training,items})});return Object.values(res).sort((a,b)=>a.start.localeCompare(b.start));function addWeek(date,o){const k=latamWeek(date);if(!res[k.key])res[k.key]={...k,main:0,breakfast:0,taxi:0,training:0,byDay:{}};res[k.key].main+=o.main;res[k.key].breakfast+=o.breakfast;res[k.key].taxi+=o.taxi;res[k.key].training+=o.training;res[k.key].byDay[date]=[...(res[k.key].byDay[date]||[]),...o.items]}}

function firstHour(d){let ts=d.events.flatMap(e=>e.times||[]).sort();return ts[0]?+ts[0].slice(0,2):null}function hasOutBase(d){return d.events.some(e=>e.code.startsWith('LA'))}function startsFromHotel(d){return false}function crossesDinner(d){return true}function crossesSupper(d){return d.events.some(e=>e.times.some(t=>t>='23:00'||t<'01:00'))}function baseTaxi(d){return false}

<div class="card"><h2>Medicações e suplementações</h2><p class="muted">Pesquise no banco local. Dados técnicos vêm do catálogo para evitar perguntas manuais ao usuário.</p><div class="grid"><select class="input" id="medCatalog">${HEALTH_MED_CATALOG.map(m=>`<option>${m.name}</option>`).join('')}</select><select class="input" id="medPeriod"><option>Ao acordar</option><option>Manhã</option><option>Tarde</option><option>Noite</option><option>Antes de dormir</option><option>SOS</option></select></div><button class="btn" onclick="addMedFromCatalog()">Adicionar aos favoritos</button><button class="btn secondary" onclick="loadProtocolDefaults()">Carregar protocolos padrão</button></div>

<div class="card"><h2>Checklist de ${fmt(state.selected)}</h2>${['Ao acordar','Manhã','Tarde','Noite','Antes de dormir','SOS'].map(p=>{const meds=state.meds.filter(m=>m.period===p);return meds.length?`<h3>${p}</h3>${meds.map(m=>`<label class="checkrow"><input type="checkbox" ${taken[m.name]?'checked':''} onchange="toggleMed('${m.name}',this.checked)"><div><b>${m.name}</b> <span class="pill ${m.status==='sensível'?'red':m.status==='restrito'?'red':m.status==='atenção'?'orange':'green'}">${m.status||'compatível'}</span><br><span class="muted">${m.class||''} · ${m.note||m.flight||''}</span></div></label>`).join('')}`:''}).join('')||'<p class="muted">Nenhum favorito cadastrado.</p>'}</div>
<div class="card"><h2>Banco local</h2><details><summary><b>Ver medicamentos e suplementos cadastrados (${HEALTH_MED_CATALOG.length})</b></summary>${HEALTH_MED_CATALOG.map(m=>`<div class="mealLine"><b>${m.name}</b> <span class="pill ${m.status==='sensível'||m.status==='restrito'?'red':m.status==='atenção'?'orange':'green'}">${m.status}</span><br><span class="muted">${m.kind} · ${m.class} · doses comuns: ${m.common}<br>Efeitos: ${(m.effects||[]).join(', ')}<br>${m.flight}</span></div>`).join('')}</details></div>`}
window.addMedFromCatalog=function(){const name=document.getElementById('medCatalog').value;const c=findMed(name);if(!c)return;state.meds.push({name:c.name,period:document.getElementById('medPeriod').value,status:c.status,class:c.class,note:c.flight});render()}
window.loadProtocolDefaults=function(){state.protocols.forEach((_,i)=>applyProtocol(i));render()}
window.saveProtocol=function(){const name=document.getElementById('protoName').value.trim();if(!name)return;const items=document.getElementById('protoItems').value.split('\n').map(x=>x.trim()).filter(Boolean);state.protocols.push({name,period:document.getElementById('protoPeriod').value,items});render()}
window.applyProtocol=function(i){const p=state.protocols[i];if(!p)return;p.items.forEach(item=>{const c=findMed(item)||{name:item,status:'compatível',class:'Favorito',flight:'Item do protocolo do usuário; revisar orientação individual.'};if(!state.meds.some(m=>m.name===item||m.name===c.name))state.meds.push({name:item,period:p.period,status:c.status,class:c.class,note:c.flight});});render()}
window.addMed=function(){window.addMedFromCatalog()};window.toggleMed=function(n,v){state.medTaken[state.selected]=state.medTaken[state.selected]||{};state.medTaken[state.selected][n]=v;save()}

function renderRelatorio(){
 const month=monthKey(state.selected); const data=buildOperationalHealthReport(month);
 document.getElementById('view-relatorio').innerHTML=`
 <div class="card noPrint"><div class="between"><div><h2>Dossiê de Saúde Operacional</h2><p class="muted">Relatório mensal para o próprio aeronauta e, quando útil, nutricionista/endócrino. Foco em constância dentro da escala irregular, sem exigir aparelhos ou biometria de mala.</p></div><button class="btn" onclick="window.print()">Exportar / salvar em PDF</button></div></div>
 <div class="reportPage"><div class="eyebrow">HealthOps Aeronautas</div><h1 style="font-size:36px;line-height:1.05;margin:8px 0">Dossiê de Saúde Operacional</h1><p><b>Período:</b> ${data.label} · <b>Versão:</b> ${VERSION}</p><div class="grid"><div><div class="metric">${data.ops.days}</div><span class="muted">dias na escala</span></div><div><div class="metric">${data.ops.duty}h</div><span class="muted">jornada</span></div><div><div class="metric">${data.ops.flight}h</div><span class="muted">voo</span></div><div><div class="metric">${data.ops.dawn}</div><span class="muted">madrugadas</span></div></div><p class="muted">Este relatório não substitui avaliação médica, nutricional ou regulatória. Ele organiza padrões observados para contextualizar a rotina operacional.</p></div>
 <div class="reportPage"><h2>1. Resumo executivo</h2><div class="grid"><div><div class="metric">${data.health.checkins}</div><span class="muted">check-ins</span></div><div><div class="metric">${data.health.avgSleep}h</div><span class="muted">sono médio</span></div><div><div class="metric">${data.health.avgWater}</div><span class="muted">ml água/dia</span></div><div><div class="metric">${data.health.avgCaffeine}</div><span class="muted">mg cafeína/dia</span></div></div><div class="grid"><div><div class="metric">${data.health.trainingDays}</div><span class="muted">dias com atividade</span></div><div><div class="metric">${data.health.mealDays}</div><span class="muted">dias com refeição registrada</span></div><div><div class="metric">${data.health.symptomDays}</div><span class="muted">dias com sintomas</span></div><div><div class="metric">${data.health.treatments}</div><span class="muted">tratamentos temporários</span></div></div>${renderInsightList(data.insights)}</div>
 <div class="reportPage"><h2>2. Calendário operacional e constância</h2><p class="muted">O objetivo é visualizar onde a irregularidade da escala impacta hábitos básicos.</p>${renderMiniMonthReport(month)}<h3>Distribuição por tipo de dia</h3>${renderBarChart(data.byType.map(x=>({label:x[0],value:x[1]})), 'dias')}</div>
 <div class="reportPage"><h2>3. Sono, hidratação e cafeína</h2><div class="grid"><div><h3>Sono por tipo de programação</h3>${renderSimpleTable(data.sleepByType,['Tipo','Sono médio'])}</div><div><h3>Hidratação por tipo de programação</h3>${renderSimpleTable(data.waterByType,['Tipo','Água média'])}</div></div><h3>Cafeína por dia registrado</h3>${renderBarChart(data.caffeineSeries,'mg')}</div>
 <div class="reportPage"><h2>4. Alimentação</h2><p class="muted">Sem calorias. O foco é regularidade, tipo de refeição e palavras mais frequentes no diário alimentar.</p><div class="grid"><div><h3>Refeições registradas</h3>${renderSimpleTable(data.mealTypes,['Refeição','Quantidade'])}</div><div><h3>Alimentos/termos mais citados</h3>${data.foodWords.length?data.foodWords.map(x=>`<span class="pill orange">${x[0]} · ${x[1]}</span>`).join(' '):'<p class="muted">Ainda não há descrições suficientes.</p>'}</div></div></div>
 <div class="reportPage"><h2>5. Exercício e recuperação</h2><div class="grid"><div><h3>Atividades realizadas</h3>${renderSimpleTable(data.trainingTypes,['Atividade','Dias'])}</div><div><h3>Treino sugerido × realizado</h3>${renderSimpleTable(data.trainingAlignment,['Categoria','Quantidade'])}</div></div></div>
 <div class="reportPage"><h2>6. Saúde, sintomas e medicamentos temporários</h2><div class="grid"><div><h3>Sintomas mais registrados</h3>${data.symptoms.length?data.symptoms.map(x=>`<span class="pill red">${x[0]} · ${x[1]}</span>`).join(' '):'<p class="muted">Sem sintomas registrados.</p>'}</div><div><h3>Tratamentos no período</h3>${data.treatmentList.length?data.treatmentList.map(t=>`<div class="mealLine"><b>${t.med}</b> · ${t.reason||'sem justificativa'}<br><span class="muted">${t.start} a ${t.end}</span></div>`).join(''):'<p class="muted">Nenhum tratamento temporário no mês.</p>'}</div></div></div>
 <div class="reportPage"><h2>7. Correlações observadas</h2><p class="muted">Associações simples, não causalidade. Servem para discussão e ajustes práticos.</p>${renderSimpleTable(data.correlations,['Comparação','Resultado observado'])}</div>
 <div class="reportPage"><h2>8. Observações para consulta</h2><ul>${data.consultNotes.map(x=>`<li>${x}</li>`).join('')}</ul></div>`
}
function buildOperationalHealthReport(month){
 const days=allDays(); const dates=[...new Set([...Object.keys(days),...Object.keys(state.health||{})].filter(d=>d.startsWith(month)))].sort();
 const ops={days:Object.keys(days).filter(d=>d.startsWith(month)).length,duty:round(sum(Object.entries(days).filter(([d])=>d.startsWith(month)).map(([,x])=>x.duty||0))),flight:round(sum(Object.entries(days).filter(([d])=>d.startsWith(month)).map(([,x])=>x.flight||0))),dawn:Object.entries(days).filter(([d,x])=>d.startsWith(month)&&isDawnDay(x)).length};
 const healthDates=Object.keys(state.health||{}).filter(d=>d.startsWith(month));
 const avg=(arr)=>arr.length?round(sum(arr)/arr.length,1):0;
 const health={checkins:healthDates.length,avgSleep:avg(healthDates.map(d=>+state.health[d].sleep||0).filter(Boolean)),avgWater:Math.round(avg(healthDates.map(d=>+state.health[d].water||0).filter(Boolean))),avgCaffeine:Math.round(avg(healthDates.map(d=>+state.health[d].caffeineMg||0).filter(x=>x>=0))),trainingDays:healthDates.filter(d=>hasAnyTraining(state.health[d])).length,mealDays:healthDates.filter(d=>(state.health[d].meals||[]).length).length,symptomDays:Object.keys(state.healthEvents||{}).filter(d=>d.startsWith(month)&&(state.healthEvents[d]||[]).length).length,treatments:(state.treatments||[]).filter(t=>t.start.slice(0,7)<=month&&t.end.slice(0,7)>=month).length};
 const byType=countBy(Object.entries(days).filter(([d])=>d.startsWith(month)).map(([,x])=>x.classification||'Sem dados'));
 const sleepByType=avgMetricByType(month,'sleep','h'); const waterByType=avgMetricByType(month,'water','ml');
 const caffeineSeries=healthDates.map(d=>({label:d.slice(8,10),value:+state.health[d].caffeineMg||0}));
 const mealTypes=countBy(healthDates.flatMap(d=>(state.health[d].meals||[]).map(m=>m.type||'Refeição')));
 const foodWords=topWords(healthDates.flatMap(d=>(state.health[d].meals||[]).map(m=>m.desc||'')).join(' '));
 const trainingTypes=countBy(healthDates.flatMap(d=>(state.health[d].trainingTypes||[])));
 const trainingAlignment=countBy(healthDates.map(d=>{const sug=trainingSuggestion(d).label; const done=hasAnyTraining(state.health[d]); return done?'Realizado com registro':(sug.includes('Recuperação')||sug.includes('Repouso')?'Não realizado em dia de recuperação':'Não registrado');}));
 const evs=Object.entries(state.healthEvents||{}).filter(([d])=>d.startsWith(month)).flatMap(([d,a])=>a.map(e=>({...e,date:d})));
 const symptoms=countBy(evs.flatMap(e=>e.symptoms||[]));
 const treatmentList=(state.treatments||[]).filter(t=>t.start.slice(0,7)<=month&&t.end.slice(0,7)>=month);
 const correlations=buildCorrelations(month,days,healthDates);
 const insights=[];
 if(ops.dawn) insights.push(`${ops.dawn} dia(s) com madrugada operacional no período, aumentando a necessidade de recuperação planejada.`);
 if(health.checkins<10) insights.push(`Há poucos check-ins no mês (${health.checkins}). As correlações ficam mais confiáveis com registro diário simples.`);
 if(health.avgSleep && health.avgSleep<6.5) insights.push(`Sono médio registrado abaixo de 6h30, ponto relevante para nutricionista/endócrino entender adesão e fome/cafeína.`);
 if(health.avgCaffeine>250) insights.push(`Cafeína média registrada elevada (${health.avgCaffeine} mg/dia). Avaliar relação com sono e ansiedade percebida.`);
 if(health.trainingDays) insights.push(`${health.trainingDays} dia(s) com atividade física registrada, útil para avaliar constância apesar de escala irregular.`);
 const consultNotes=[`Levar este relatório como contexto da rotina: ele mostra a irregularidade operacional, não apenas hábitos isolados.`,`Avaliar estratégias realistas para dias de hotel, madrugada e pós-jornada longa.`,`As associações são observacionais e dependem da constância do registro.`];
 return{label:new Date(month+'-01T00:00').toLocaleDateString('pt-BR',{month:'long',year:'numeric'}),ops,health,byType:Object.entries(byType),sleepByType,waterByType,caffeineSeries,mealTypes:Object.entries(mealTypes),foodWords,trainingTypes:Object.entries(trainingTypes),trainingAlignment:Object.entries(trainingAlignment),symptoms:Object.entries(symptoms).sort((a,b)=>b[1]-a[1]),treatmentList,correlations,insights,consultNotes};
}
function avgMetricByType(month,field,suffix){const days=allDays();const buckets={};Object.keys(state.health||{}).filter(d=>d.startsWith(month)).forEach(d=>{const v=+state.health[d][field]||0;if(!v)return;const type=(days[d]&&days[d].classification)||'Sem escala';buckets[type]=buckets[type]||[];buckets[type].push(v);});return Object.entries(buckets).map(([k,a])=>[k,`${field==='sleep'?round(sum(a)/a.length,1):Math.round(sum(a)/a.length)} ${suffix}`]);}
function buildCorrelations(month,days,healthDates){const out=[];const byClass={};healthDates.forEach(d=>{const c=(days[d]&&days[d].classification)||'Sem escala';byClass[c]=byClass[c]||[];byClass[c].push(state.health[d]);});Object.entries(byClass).forEach(([c,arr])=>{const sl=arr.map(h=>+h.sleep||0).filter(Boolean);const caf=arr.map(h=>+h.caffeineMg||0).filter(x=>x>=0);if(sl.length)out.push([`Sono em ${c}`,`${round(sum(sl)/sl.length,1)}h em média (${sl.length} registro(s))`]);if(caf.length)out.push([`Cafeína em ${c}`,`${Math.round(sum(caf)/caf.length)} mg/dia em média`]);});const highCaf=healthDates.filter(d=>(+state.health[d].caffeineMg||0)>250);if(highCaf.length){const avgSleep=round(sum(highCaf.map(d=>+state.health[d].sleep||0).filter(Boolean))/(highCaf.map(d=>+state.health[d].sleep||0).filter(Boolean).length||1),1);out.push(['Dias com cafeína >250 mg',`${highCaf.length} dia(s); sono médio registrado ${avgSleep||'sem dados'}h`]);}return out.length?out:[['Dados insuficientes','Registre sono, água, cafeína, refeições e treino por algumas semanas para gerar correlações úteis.']];}
function countBy(arr){return arr.filter(Boolean).reduce((a,x)=>(a[x]=(a[x]||0)+1,a),{})}
function topWords(text){const stop=new Set('de da do das dos e a o as os um uma para com no na em ao ou que sem por mais menos muito pouco hotel aeroporto bordo comida lanche café almoço jantar ceia'.split(' '));const counts=String(text||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,' ').split(/\s+/).filter(w=>w.length>2&&!stop.has(w)).reduce((a,w)=>(a[w]=(a[w]||0)+1,a),{});return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,12)}
function renderBarChart(data,unit){if(!data||!data.length)return '<p class="muted">Sem dados para gráfico.</p>';const max=Math.max(1,...data.map(x=>+x.value||0));return `<div class="chart">${data.map(x=>`<div class="bar" style="height:${Math.max(4,((+x.value||0)/max)*145)}px"><span>${x.value}</span><small>${String(x.label).slice(0,6)}</small></div>`).join('')}</div><p class="muted">${unit}</p>`}
function renderSimpleTable(rows,heads){if(!rows||!rows.length)return '<p class="muted">Sem dados.</p>';return `<table style="width:100%;border-collapse:collapse"><thead><tr>${heads.map(h=>`<th style="text-align:left;border-bottom:1px solid var(--line);padding:8px">${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td style="border-bottom:1px solid var(--line);padding:8px">${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`}
function renderInsightList(arr){return arr&&arr.length?`<div class="alert"><b>Principais leituras do mês</b><ul>${arr.map(x=>`<li>${x}</li>`).join('')}</ul></div>`:''}
function renderMiniMonthReport(month){const days=allDays();const [y,m]=month.split('-').map(Number);const first=new Date(y,m-1,1), start=new Date(first);start.setDate(1-first.getDay());let cells=[];for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);const id=iso(d);const tag=classifyDayTag(days[id]);cells.push(`<div class="day ${d.getMonth()!==m-1?'out':''}"><div class="daynum">${d.getDate()}</div><span class="tag ${tag.cls}">${tag.label}</span></div>`)}return `<div class="calendar">${['D','S','T','Q','Q','S','S'].map(x=>`<div class="dow">${x}</div>`).join('')}${cells.join('')}</div>`}

function renderDebug(){const r=currentRoster();document.getElementById('view-debug').innerHTML=`${renderNormativePanel()}<div class="card"><h2>Debug do parser</h2><p class="muted">Use para validar escalas antigas e futuras.</p><div class="debug">${escapeHtml((r.debug||[]).join('\n')||'Nenhum debug disponível.')}</div></div>`}
function escapeHtml(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
render();

// HealthOps clean-test build: helper para limpar caches antigos sem perder localStorage.
window.resetPwaCache = async function(){
  try{
    if('serviceWorker' in navigator){
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.unregister()));
    }
    if(window.caches){
      const keys = await caches.keys();
      await Promise.all(keys.map(k=>caches.delete(k)));
    }
    alert('Cache do PWA limpo. Recarregue a página com Ctrl+F5 ou feche/abra o app.');
  }catch(e){ alert('Não foi possível limpar automaticamente: '+e.message); }
};
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js?v=2.0-alpha.11-clean').catch(()=>{}));
}
