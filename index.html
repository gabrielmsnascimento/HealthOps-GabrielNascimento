<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HealthOps Aeronautas v1.0-beta.7</title>
<style>
:root{--bg:#f4f1eb;--card:#fff;--ink:#0f1d2a;--muted:#68727d;--line:#ded8cf;--brand:#23404a;--copper:#b06d42;--ok:#2e7d52;--warn:#c7861d;--bad:#a33a3a;--blue:#2f6f9f;--purple:#7353a4;--greenbg:#eaf7ee;--yellowbg:#fff4cd;--redbg:#faeaea;--bluebg:#eaf4fb;--purplebg:#f1ecf8;--graybg:#f1f1ee}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}header{padding:26px 20px 14px;max-width:1180px;margin:auto}.eyebrow{font-weight:800;letter-spacing:.14em;color:var(--copper);font-size:12px;text-transform:uppercase}h1{font-size:clamp(30px,5vw,56px);line-height:.95;margin:8px 0 10px}p{color:var(--muted)}.version{position:fixed;right:12px;top:12px;background:var(--brand);color:#fff;padding:8px 12px;border-radius:999px;font-weight:800;font-size:12px;z-index:10}.wrap{max-width:1180px;margin:auto;padding:0 16px 92px}.tabs{position:fixed;bottom:0;left:0;right:0;background:rgba(244,241,235,.96);backdrop-filter:blur(10px);display:flex;gap:8px;padding:10px;z-index:9;border-top:1px solid var(--line)}.tab{flex:1;border:0;border-radius:16px;padding:14px 8px;background:#e9e6df;color:#6d6a63;font-weight:800;cursor:pointer}.tab.active{background:var(--brand);color:#fff}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.card{background:var(--card);border-radius:22px;padding:18px;border:1px solid rgba(0,0,0,.06);box-shadow:0 10px 30px rgba(0,0,0,.05);margin-bottom:14px}.metric{font-size:34px;font-weight:900;color:#153846}.muted{color:var(--muted);font-size:14px}.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}.between{display:flex;align-items:center;justify-content:space-between;gap:12px}.btn{border:0;background:var(--brand);color:#fff;padding:12px 16px;border-radius:14px;font-weight:800;cursor:pointer;min-height:44px}.btn.secondary{background:#e9e6df;color:var(--ink)}.btn.danger{background:#a83d3d}.btn.small{padding:8px 12px;min-height:36px;font-size:13px}.input,textarea,select{width:100%;border:1px solid #cfc8bd;border-radius:14px;padding:12px;font:inherit;background:#fff}textarea{min-height:150px}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.dow{text-align:center;font-weight:900;color:var(--muted);font-size:12px}.day{min-height:86px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:8px;cursor:pointer;position:relative}.day.out{opacity:.35}.day.selected{outline:3px solid var(--brand)}.day.today{box-shadow:0 0 0 2px var(--copper) inset}.daynum{font-weight:900}.tag{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:900;margin-top:6px}.tag.rest{background:var(--greenbg);color:var(--ok)}.tag.flight{background:var(--bluebg);color:var(--blue)}.tag.train{background:var(--purplebg);color:var(--purple)}.tag.reserve{background:var(--yellowbg);color:var(--warn)}.tag.fatigue{background:var(--redbg);color:var(--bad)}.tag.none{background:var(--graybg);color:#777}.timeline{display:grid;grid-template-columns:1fr 1.4fr 1fr;gap:12px}.timebox{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;cursor:pointer}.timebox.active{background:var(--brand);color:#fff}.timebox.active p{color:#dce8eb}.pill{display:inline-block;background:#eef0ef;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;margin:2px}.pill.green{background:var(--greenbg);color:var(--ok)}.pill.blue{background:var(--bluebg);color:var(--blue)}.pill.purple{background:var(--purplebg);color:var(--purple)}.pill.orange{background:var(--yellowbg);color:var(--warn)}.pill.red{background:var(--redbg);color:var(--bad)}.listday{display:grid;grid-template-columns:120px 1fr 80px 80px 1.6fr;gap:10px;align-items:center;border-bottom:1px solid var(--line);padding:12px 0}.alert{border-left:5px solid var(--warn);background:var(--yellowbg);padding:14px;border-radius:16px;margin:10px 0}.alert.bad{border-color:var(--bad);background:var(--redbg)}.hidden{display:none}.mealLine{padding:9px 0;border-bottom:1px dashed var(--line)}.checkrow{display:flex;align-items:flex-start;gap:12px;border:1px solid var(--line);border-radius:16px;padding:12px;margin:8px 0}.checkrow input{width:22px;height:22px;accent-color:var(--brand);flex:0 0 auto}.debug{white-space:pre-wrap;background:#111b22;color:#d9f1e4;border-radius:16px;padding:14px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;max-height:320px;overflow:auto}@media(max-width:850px){.grid{grid-template-columns:repeat(2,1fr)}.timeline{grid-template-columns:1fr}.listday{grid-template-columns:1fr}.calendar{gap:5px}.day{min-height:70px;padding:6px}.tag{font-size:10px;padding:3px 6px}h1{font-size:38px}}
</style>
</head>
<body>
<div class="version">v1.0-beta.7</div>
<header>
<div class="eyebrow">HealthOps Aeronautas</div>
<h1>Linha do tempo operacional</h1>
<p>Calendário, histórico de escalas, motores e check-in por data selecionada.</p>
</header>
<div class="wrap">
<section id="view-hoje" class="view"></section>
<section id="view-escala" class="view hidden"></section>
<section id="view-diarias" class="view hidden"></section>
<section id="view-saude" class="view hidden"></section>
<section id="view-medicacoes" class="view hidden"></section>
<section id="view-debug" class="view hidden"></section>
</div>
<nav class="tabs">
<button class="tab active" data-view="hoje">Hoje</button>
<button class="tab" data-view="escala">Escala</button>
<button class="tab" data-view="diarias">Diárias</button>
<button class="tab" data-view="saude">Saúde</button>
<button class="tab" data-view="medicacoes">Medicações</button>
<button class="tab" data-view="debug">Debug</button>
</nav>
<script>
const VERSION='v1.0-beta.7';
const LS='healthops_v1_beta7';
const MONTHS={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
const PTW=['dom.','seg.','ter.','qua.','qui.','sex.','sáb.'];
const state=load()||{selected:iso(new Date()), calendarMonth:null, rosters:{}, activeRosterKey:null, meds:[{name:'Sibutramina',period:'Manhã',status:'sensível',note:'Inibidor de apetite: atenção a insônia, boca seca, pressão/frequência cardíaca e palpitações.'},{name:'Ômega 3',period:'Manhã',status:'compatível',note:'Suplemento nutricional.'},{name:'Vitamina D3',period:'Manhã',status:'compatível',note:'Suplemento vitamínico.'},{name:'Magnésio dimalato',period:'Noite',status:'compatível',note:'Suplemento mineral.'}], medTaken:{}, health:{}, caffeine:[]};
if(!state.calendarMonth) state.calendarMonth=state.selected.slice(0,7);
function save(){localStorage.setItem(LS,JSON.stringify(state))}function load(){try{return JSON.parse(localStorage.getItem(LS))}catch(e){return null}}function iso(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate()).toISOString().slice(0,10)}function pad(n){return String(n).padStart(2,'0')}function parseIso(s){const [y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}function fmt(s){const d=parseIso(s);return `${PTW[d.getDay()]}, ${pad(d.getDate())}/${pad(d.getMonth()+1)}`}function addDays(s,n){const d=parseIso(s);d.setDate(d.getDate()+n);return iso(d)}function monthKey(d){return d.slice(0,7)}function currentRoster(){return state.rosters[state.activeRosterKey]||{days:{},raw:'',debug:[]}}function allDays(){return currentRoster().days||{}}function dayData(date){return allDays()[date]||null}
function classifyTraining(day){if(!day) return {key:'sem',label:'Sem dados',color:'none'}; if(day.classification==='Folga regulamentar')return{key:'forte',label:'Treino possível',color:'rest'}; if(day.classification==='Voo'&&day.fatigue>=75)return{key:'recuperacao',label:'Recuperação',color:'fatigue'}; if(day.classification==='Voo'&&day.fatigue>=45)return{key:'leve',label:'Leve/mobilidade',color:'reserve'}; if(day.classification==='Treinamento')return{key:'leve',label:'Leve após atividade',color:'train'}; if(day.classification==='Reserva/Sobreaviso')return{key:'curto',label:'Curto flexível',color:'reserve'}; return{key:'moderado',label:'Moderado',color:'flight'}}
function classifyDayTag(day){if(!day)return {label:'Sem dados',cls:'none'}; if(day.classification==='Folga regulamentar')return{label:'Folga',cls:'rest'}; if(day.classification==='Voo'&&day.fatigue>=75)return{label:'Madrugada',cls:'fatigue'}; if(day.classification==='Voo')return{label:'Voo',cls:'flight'}; if(day.classification==='Treinamento')return{label:'Treino',cls:'train'}; if(day.classification==='Reserva/Sobreaviso')return{label:'Reserva',cls:'reserve'}; return{label:day.classification||'Atividade',cls:'none'}}
function activeSummary(){const days=Object.values(allDays());return{count:days.length,jornada:sum(days.map(d=>d.duty)),flight:sum(days.map(d=>d.flight)),folgas:days.filter(d=>d.classification==='Folga regulamentar').length,reserva:days.filter(d=>d.classification==='Reserva/Sobreaviso'||d.classification==='Treinamento').length}}function sum(a){return Math.round(a.reduce((x,y)=>x+(+y||0),0)*10)/10}
function render(){renderHoje();renderEscala();renderDiarias();renderSaude();renderMeds();renderDebug();document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>switchView(b.dataset.view));save()}function switchView(v){document.querySelectorAll('.view').forEach(x=>x.classList.add('hidden'));document.getElementById('view-'+v).classList.remove('hidden');document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.view===v))}
function renderHoje(){const day=dayData(state.selected);const tr=classifyTraining(day);const prev=addDays(state.selected,-1),next=addDays(state.selected,1);document.getElementById('view-hoje').innerHTML=`
<div class="timeline"><div class="timebox" onclick="selectDate('${prev}')"><b>${fmt(prev)}</b><p>${dayData(prev)?.classification||'Sem dados'}</p></div><div class="timebox active"><b>Data selecionada</b><h2>${fmt(state.selected)}</h2><p>${day?.classification||'Sem dados disponíveis para esta data.'}</p></div><div class="timebox" onclick="selectDate('${next}')"><b>${fmt(next)}</b><p>${dayData(next)?.classification||'Sem dados'}</p></div></div>
<div class="grid"><div class="card"><b>Jornada</b><div class="metric">${day?day.duty+'h':'—'}</div></div><div class="card"><b>Voo</b><div class="metric">${day?day.flight+'h':'—'}</div></div><div class="card"><b>Treino sugerido</b><div class="metric" style="font-size:22px">${tr.label}</div></div><div class="card"><b>Fadiga</b><div class="metric">${day?day.fatigue:'—'}</div></div></div>
<div class="card"><h2>Alertas da data</h2>${alerts(day).map(a=>`<div class="alert ${a.bad?'bad':''}"><b>${a.title}</b><br>${a.text}</div>`).join('')||'<p>Sem alertas relevantes para a data selecionada.</p>'}</div>
${renderCalendarCard()}`}
function alerts(day){let arr=[];const h=state.health[state.selected]||{};if(!day)arr.push({title:'Sem dados operacionais',text:'Importe uma escala para analisar esta data.'});if(day&&day.fatigue>=75)arr.push({title:'Atenção à fadiga',text:'Dia com carga elevada ou madrugada operacional.',bad:true});if((h.water||0)<1500)arr.push({title:'Hidratação',text:'Você ainda não registrou água suficiente para esta data.'});if((h.caffeineMg||0)>300)arr.push({title:'Cafeína elevada',text:'Consumo registrado acima de 300 mg.',bad:true});if(!h.training)arr.push({title:'Treino',text:'Já fez exercício hoje? Não esqueça de marcar.'});return arr}
function renderCalendarCard(){const [y,m]=state.calendarMonth.split('-').map(Number);const first=new Date(y,m-1,1);const start=new Date(first);start.setDate(1-first.getDay());let cells=[];for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);const id=iso(d);const day=dayData(id);const tag=classifyDayTag(day);cells.push(`<div class="day ${d.getMonth()!==m-1?'out':''} ${id===state.selected?'selected':''} ${id===iso(new Date())?'today':''}" onclick="selectDate('${id}')"><div class="daynum">${d.getDate()}</div><span class="tag ${tag.cls}">${tag.label}</span></div>`)}return `<div class="card"><div class="between"><button class="btn secondary small" onclick="changeMonth(-1)">◀</button><h2>${first.toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}</h2><button class="btn secondary small" onclick="changeMonth(1)">▶</button></div><div class="calendar">${['D','S','T','Q','Q','S','S'].map(x=>`<div class="dow">${x}</div>`).join('')}${cells.join('')}</div></div>`}
window.selectDate=function(d){state.selected=d;state.calendarMonth=monthKey(d);render()};window.changeMonth=function(n){const [y,m]=state.calendarMonth.split('-').map(Number);const d=new Date(y,m-1+n,1);state.calendarMonth=`${d.getFullYear()}-${pad(d.getMonth()+1)}`;render()}
function renderEscala(){const s=activeSummary();const days=Object.entries(allDays()).sort();document.getElementById('view-escala').innerHTML=`
<div class="grid"><div class="card"><b>Dias processados</b><div class="metric">${s.count}</div></div><div class="card"><b>Jornada total</b><div class="metric">${s.jornada}h</div></div><div class="card"><b>Tempo de voo</b><div class="metric">${s.flight}h</div></div><div class="card"><b>Folgas</b><div class="metric">${s.folgas}</div></div></div>
${renderCalendarCard()}
<div class="card"><h2>Linha do tempo do mês</h2>${days.map(([date,d])=>`<div class="listday" onclick="selectDate('${date}')"><b>${fmt(date)}</b><span>${d.classification}</span><span>${d.duty}h</span><span>${d.flight}h</span><span>${d.events.map(e=>`<span class="pill ${e.type==='rest'?'green':e.type==='flight'?'blue':e.type==='training'?'purple':'orange'}">${e.code}</span>`).join('')}</span></div>`).join('')||'<p>Nenhuma escala processada.</p>'}</div>
<div class="card"><h2>Dias por treino recomendado</h2>${renderTrainingGroups()}</div>
<div class="card"><h2>Biblioteca de escalas importadas</h2><div class="row">${Object.keys(state.rosters).map(k=>`<button class="btn ${k===state.activeRosterKey?'':'secondary'} small" onclick="setRoster('${k}')">${k}</button>`).join(' ')||'<p>Nenhuma escala salva.</p>'}</div><button class="btn danger small" onclick="clearInvalidRosters()">Limpar imports inválidos</button></div>
<div class="card"><h2>Importar escala IFN/iFlight Neo</h2><p class="muted">Carregue PDF/TXT ou cole o texto. A escala será salva por mês e poderá ser comparada depois.</p><input class="input" type="file" id="file" accept=".txt,.pdf"><label><b>Texto extraído/colado</b></label><textarea id="raw">${escapeHtml(currentRoster().raw||'')}</textarea><div class="row"><button class="btn" onclick="processRaw()">Processar e salvar escala</button><button class="btn danger" onclick="clearRoster()">Limpar escala ativa</button></div><p class="muted">${s.count} dias processados.</p></div>`;setTimeout(()=>{const f=document.getElementById('file');if(f)f.onchange=readFile},0)}
function renderTrainingGroups(){const groups={forte:[],moderado:[],curto:[],leve:[],recuperacao:[],sem:[]};Object.entries(allDays()).forEach(([date,d])=>groups[classifyTraining(d).key].push(date));const labels={forte:'Treino possível',moderado:'Treino moderado',curto:'Treino curto/flexível',leve:'Leve/mobilidade',recuperacao:'Recuperação',sem:'Sem dados'};return Object.entries(groups).map(([k,arr])=>arr.length?`<details open><summary><b>${labels[k]}</b> · ${arr.length} dia(s)</summary>${arr.map(d=>`<span class="pill">${fmt(d)}</span>`).join('')}</details>`:'').join('')||'<p>Sem dados.</p>'}
window.setRoster=function(k){state.activeRosterKey=k;const dates=Object.keys(allDays()).sort();if(dates[0]){state.selected=dates[0];state.calendarMonth=monthKey(dates[0])}render()}

async function ensurePdfJs(){
  if(window.pdfjsLib) return window.pdfjsLib;
  await new Promise((resolve,reject)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';s.onload=resolve;s.onerror=reject;document.head.appendChild(s)});
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  return window.pdfjsLib;
}
async function readFile(ev){
  const file=ev.target.files[0]; if(!file)return;
  const rawBox=document.getElementById('raw');
  rawBox.value='Lendo arquivo...';
  try{
    if(file.type==='application/pdf' || file.name.toLowerCase().endsWith('.pdf')){
      const pdfjs=await ensurePdfJs();
      const buf=await file.arrayBuffer();
      const pdf=await pdfjs.getDocument({data:buf}).promise;
      const pages=[];
      for(let i=1;i<=pdf.numPages;i++){
        const page=await pdf.getPage(i);
        const content=await page.getTextContent();
        let lastY=null,line=[];const lines=[];
        content.items.forEach(it=>{const y=Math.round(it.transform[5]); if(lastY!==null && Math.abs(y-lastY)>4){lines.push(line.join(' ')); line=[];} line.push(it.str); lastY=y;});
        if(line.length) lines.push(line.join(' '));
        pages.push(lines.join('\n'));
      }
      const text=pages.join('\n');
      rawBox.value=text;
      if(!/Roster Report|\d{2}-[A-Z][a-z]{2}-\d{4}|\bLA\d{4}\b|\bDO\b|\bHSB/.test(text)){
        alert('PDF lido, mas o texto extraído não parece uma escala IFN. Tente copiar/colar o texto ou enviar outro formato.');
      }
    }else{
      rawBox.value=await file.text();
    }
  }catch(err){
    console.error(err);
    rawBox.value='';
    alert('Não consegui extrair texto deste PDF no navegador. Tente atualizar a página, limpar cache do PWA ou copiar/colar o texto da escala.');
  }
}


window.processRaw=function(){
  const raw=document.getElementById('raw').value||'';
  if(raw.trim().startsWith('%PDF-') || raw.includes('/Type/Pages') || raw.includes('endobj')){
    alert('O conteúdo carregado é o binário do PDF, não o texto da escala. Selecione novamente o PDF nesta versão ou copie/cole o texto extraído.');
    return;
  }
  const roster=parseRoster(raw);
  if(!Object.keys(roster.days||{}).length){
    alert('Nenhum dia foi processado. Verifique se o texto contém linhas como 01-May-2026, DO, HSB ou voos LAxxxx.');
    return;
  }
  state.rosters[roster.key]=roster; state.activeRosterKey=roster.key;
  const dates=Object.keys(roster.days).sort();
  if(dates[0]){state.selected=dates.includes(iso(new Date()))?iso(new Date()):dates[0];state.calendarMonth=monthKey(state.selected)}
  render();
};
window.clearRoster=function(){if(state.activeRosterKey)delete state.rosters[state.activeRosterKey];state.activeRosterKey=Object.keys(state.rosters)[0]||null;render()}
window.clearInvalidRosters=function(){Object.keys(state.rosters).forEach(k=>{const r=state.rosters[k]; if(!r || !r.days || !Object.keys(r.days).length || (r.raw||'').startsWith('%PDF-')) delete state.rosters[k];}); state.activeRosterKey=Object.keys(state.rosters)[0]||null; render();}

function parseRoster(raw){
  const text=normalizeRosterText(raw);
  const lines=text.split(/\n+/).map(x=>x.trim()).filter(Boolean);
  let days={},debug=[],stats={rows:0,events:0,ignored:0,unparsed:0};
  const head=text.match(/Roster Report\s+(\d{2})-(\w{3})-(\d{4})\s*to\s*(\d{2})-(\w{3})-(\d{4})/i)||text.match(/(\d{2})-(\w{3})-(\d{4})\s*to\s*(\d{2})-(\w{3})-(\d{4})/i)||text.match(/(\d{2})-(\w{3})-(\d{4})to(\d{2})-(\w{3})-(\d{4})/i);
  let period='Escala importada', key='Import '+new Date().toISOString().slice(0,16), reportStart=null, reportEnd=null;
  if(head){reportStart=`${head[3]}-${pad(MONTHS[head[2]]+1)}-${head[1]}`; reportEnd=`${head[6]}-${pad(MONTHS[head[5]]+1)}-${head[4]}`; key=`${head[3]}-${pad(MONTHS[head[2]]+1)}`; period=`${reportStart} a ${reportEnd}`;}
  let anchorDate=null;
  for(const rawLine of lines){
    let line=rawLine.replace(/\s+/g,' ').trim();
    if(!line || /^Roster Report|^Date |^LEGEND|^HSB Home|^DO Day|^VC Vacation|^DR Requested|^<== Pairing/i.test(line)){stats.ignored++;continue;}
    if(line.startsWith('<==')){stats.ignored++;debug.push(`IGNORADO: continuação anterior ao início do mês -> ${line.slice(0,80)}`);continue;}
    const dm=line.match(/^(\d{2})-(\w{3})-(\d{4})\s+(?:Mon|Tue|Wed|Thu|Fri|Sat|Sun)?\s*(.*)$/i);
    let baseDate,rest;
    if(dm){baseDate=`${dm[3]}-${pad(MONTHS[dm[2]]+1)}-${dm[1]}`; anchorDate=baseDate; rest=dm[4];}
    else if(anchorDate && looksLikeContinuation(line)){baseDate=anchorDate; rest=line;}
    else {stats.unparsed++; debug.push(`NÃO PROCESSADO: ${line.slice(0,110)}`); continue;}
    if(reportStart && baseDate<reportStart){stats.ignored++; debug.push(`IGNORADO fora da janela mensal: ${baseDate} ${rest.slice(0,70)}`); continue;}
    const events=parseEventsFromLine(baseDate,rest);
    if(!events.length){stats.unparsed++; debug.push(`SEM EVENTO: ${baseDate} | ${rest.slice(0,110)}`); continue;}
    for(const ev of events){
      const eventDate=ev.date||baseDate;
      if(reportStart && eventDate<reportStart){stats.ignored++; continue;}
      if(!days[eventDate]) days[eventDate]={date:eventDate,events:[],classification:'Sem dados',duty:0,flight:0,fatigue:0,issues:[]};
      days[eventDate].events.push(ev); stats.events++;
      debug.push(`${eventDate}: ${ev.code} -> ${ev.type} | duty=${ev.duty||0} flight=${ev.flight||0} | ${ev.source||rest.slice(0,70)}`);
    }
    stats.rows++;
  }
  Object.values(days).forEach(d=>finalizeDay(d));
  debug.unshift(`Parser IFN v2: ${stats.events} eventos em ${Object.keys(days).length} dias. Linhas não processadas: ${stats.unparsed}. Ignoradas: ${stats.ignored}.`);
  return{key,period,raw:text,days,debug,createdAt:new Date().toISOString(),parser:'IFN-v2'};
}
function normalizeRosterText(raw){return String(raw||'').replace(/[\u000c\ufffe]/g,' ').replace(/(HSB|HSBE|ASB|CRMBSB|R320|CBF|EMER)\s*-\s*/g,'$1-').replace(/(\d{2})-(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)-(\d{4})/g,'\n$1-$2-$3').replace(/\n\s*([A-Z]{2}\d{4})/g,'\n$1').replace(/\n\s*(\d{2}:\d{2}\(\+\d\))/g,'\n$1').replace(/\n{2,}/g,'\n');}
function looksLikeContinuation(line){return /^(\d{2}:\d{2}(?:\(\+\d\))?\s+)?(LA\d{4}|ASB|HSB|HSBE|CRMBSB|R320|CBF|EMER|DO|DR|VC)\b/i.test(line)||/\b(LA\d{4})\b/.test(line);}
function parseEventsFromLine(baseDate,line){
  const codeMatch=line.match(/\b(VC|DO|DR|HSBE|HSB|ASB\d?|CRMBSB|R320|CBF|EMER)\b/i);
  if(codeMatch && !/\bLA\d{4}\b/.test(line)){
    const code=codeMatch[1].toUpperCase(); const times=extractTimes(line); const duty=activityDuty(code,times);
    const type=(code==='DO'||code==='DR')?'rest':code==='VC'?'vacation':code.startsWith('HSB')?'standby':code.startsWith('ASB')?'reserve':'training';
    return[{code,type,duty,flight:0,times:times.map(t=>t.label),date:baseDate,source:line}];
  }
  const flights=[]; const re=/\b(LA\d{4})\b\s+(OP|PS)?\s*([A-Z]{3})\s+(\d{2}:\d{2})(?:\(\+(\d)\))?\s+([A-Z]{3})\s+(\d{2}:\d{2})(?:\(\+(\d)\))?/g; let m;
  while((m=re.exec(line))){
    const depAbs=absMinutes(baseDate,m[4],+(m[5]||0)); let arrAbs=absMinutes(baseDate,m[7],+(m[8]||0)); if(arrAbs<depAbs) arrAbs+=1440;
    const date=isoFromAbs(baseDate,depAbs); const flight=round((arrAbs-depAbs)/60);
    flights.push({code:m[1],op:m[2]||'',type:'flight',duty:0,flight,times:[m[4]+(m[5]?`(+${m[5]})`:''),m[7]+(m[8]?`(+${m[8]})`:'')],absStart:depAbs,absEnd:arrAbs,date,source:`${m[1]} ${m[3]} ${m[4]}-${m[6]} ${m[7]}`});
  }
  if(flights.length) return flights;
  const bare=line.match(/\b(LA\d{4})\b/); if(bare){const times=extractTimes(line); const off=maxOffset(line); const date=addDays(baseDate,off); let flight=0; if(times.length>=2){const a=times[times.length-2],b=times[times.length-1];let end=b.abs;if(end<a.abs)end+=1440;flight=round((end-a.abs)/60);} return[{code:bare[1],type:'flight',duty:0,flight,times:times.map(t=>t.label),date,source:line}];}
  return[];
}
function extractTimes(line){const out=[];const re=/(\d{2}:\d{2})(?:\(\+(\d)\))?/g;let m;while((m=re.exec(line))){out.push({label:m[1]+(m[2]?`(+${m[2]})`:''),time:m[1],offset:+(m[2]||0),abs:absMinutes('2000-01-01',m[1],+(m[2]||0))});}return out;}
function activityDuty(code,times){if(code==='DO'||code==='DR'||code==='VC')return 0;if(code==='R320')return 4;if(code==='CBF'||code==='EMER')return 2;if(code==='CRMBSB')return times.length>=2?round((times[times.length-1].abs-times[0].abs)/60):4;if(code.startsWith('HSB')||code.startsWith('ASB'))return times.length>=2?Math.min(12,Math.max(0,round((times[times.length-1].abs-times[0].abs)/60))):(code.startsWith('ASB')?6:12);return 0;}
function absMinutes(baseDate,time,off){const [h,m]=time.split(':').map(Number);return off*1440+h*60+m;}
function isoFromAbs(baseDate,mins){return addDays(baseDate,Math.floor(mins/1440));}
function maxOffset(line){let max=0; for(const m of line.matchAll(/\(\+(\d)\)/g)) max=Math.max(max,+m[1]); return max;}
function finalizeDay(d){
  const types=new Set(d.events.map(e=>e.type));
  if(types.has('flight'))d.classification='Voo'; else if(types.has('training'))d.classification='Treinamento'; else if(types.has('reserve')||types.has('standby'))d.classification='Reserva/Sobreaviso'; else if(types.has('rest'))d.classification='Folga regulamentar'; else if(types.has('vacation'))d.classification='Férias/VC'; else d.classification='Atividade';
  d.flight=round(sum(d.events.map(e=>e.flight||0)));
  const abs=d.events.filter(e=>Number.isFinite(e.absStart)&&Number.isFinite(e.absEnd));
  if(d.classification==='Voo' && abs.length){const first=Math.min(...abs.map(e=>e.absStart)); const last=Math.max(...abs.map(e=>e.absEnd)); d.duty=round((last-first)/60+1.0);}
  else d.duty=round(sum(d.events.map(e=>e.duty||0)));
  if(d.classification==='Folga regulamentar'||d.classification==='Férias/VC')d.duty=0;
  const crosses=d.events.some(e=>(e.absStart%1440)<360||(e.absEnd%1440)<360||(e.times||[]).some(t=>/0[0-5]:/.test(t)));
  d.fatigue=d.classification==='Voo'?(crosses?85:45):d.classification==='Folga regulamentar'?10:d.classification==='Férias/VC'?5:35;
}
function renderDiarias(){const weeks=calcPerDiems();document.getElementById('view-diarias').innerHTML=`<div class="card"><h2>Diárias por janela LATAM</h2><p class="muted">Agrupamento quarta–terça, pagamento quinta. Quantidades, sem valores.</p></div>${weeks.map(w=>`<div class="card"><h2>${w.label}</h2><div class="grid"><div><div class="metric">${w.main}</div><span class="muted">principais</span></div><div><div class="metric">${w.breakfast}</div><span class="muted">cafés</span></div><div><div class="metric">${w.taxi}</div><span class="muted">táxis</span></div><div><div class="metric">${w.training}</div><span class="muted">treinamentos*</span></div></div><p>Pagamento previsto: <b>${w.pay}</b></p><details><summary><b>Ver itens</b></summary>${Object.entries(w.byDay).map(([d,it])=>`<div class="mealLine"><b>${d.slice(8,10)}/${d.slice(5,7)}</b> - ${it.join(', ')}</div>`).join('')}</details></div>`).join('')||'<div class="card">Sem diárias calculadas.</div>'}`}
function calcPerDiems(){const days=allDays();const res={};Object.entries(days).forEach(([date,d])=>{if(d.classification==='Folga regulamentar'||d.classification==='Férias/VC')return;const items=[];let main=0,breakfast=0,taxi=0,training=0;if(d.classification==='Treinamento'){training++;items.push('Treinamento*')}if(d.classification==='Voo'||d.classification==='Reserva/Sobreaviso'||d.classification==='Treinamento'){const startHour=firstHour(d);const outBase=hasOutBase(d);if(startHour!==null&&startHour>=5&&startHour<8&&d.classification==='Voo'&&!startsFromHotel(d)){breakfast++;items.push('Café')} if(outBase||d.classification==='Treinamento'||d.classification==='Reserva/Sobreaviso'){main++;items.push('Almoço'); if(d.classification==='Voo'&&crossesDinner(d)){main++;items.push('Jantar')} if(d.classification==='Voo'&&crossesSupper(d)){main++;items.push('Ceia')}} if(d.classification==='Voo'&&baseTaxi(d)){taxi++;items.push('Táxi')}}if(items.length)addWeek(date,{main,breakfast,taxi,training,items})});return Object.values(res).sort((a,b)=>a.start.localeCompare(b.start));function addWeek(date,o){const k=latamWeek(date);if(!res[k.key])res[k.key]={...k,main:0,breakfast:0,taxi:0,training:0,byDay:{}};res[k.key].main+=o.main;res[k.key].breakfast+=o.breakfast;res[k.key].taxi+=o.taxi;res[k.key].training+=o.training;res[k.key].byDay[date]=[...(res[k.key].byDay[date]||[]),...o.items]}}
function latamWeek(date){const d=parseIso(date);const day=d.getDay();const back=(day+4)%7;const start=new Date(d);start.setDate(d.getDate()-back);const end=new Date(start);end.setDate(start.getDate()+6);const pay=new Date(end);pay.setDate(end.getDate()+2);return{key:iso(start),start:iso(start),label:`${pad(start.getDate())}/${pad(start.getMonth()+1)} a ${pad(end.getDate())}/${pad(end.getMonth()+1)}`,pay:`${pad(pay.getDate())}/${pad(pay.getMonth()+1)}`}}
function firstHour(d){let ts=d.events.flatMap(e=>e.times||[]).sort();return ts[0]?+ts[0].slice(0,2):null}function hasOutBase(d){return d.events.some(e=>e.code.startsWith('LA'))}function startsFromHotel(d){return false}function crossesDinner(d){return true}function crossesSupper(d){return d.events.some(e=>e.times.some(t=>t>='23:00'||t<'01:00'))}function baseTaxi(d){return false}
function renderSaude(){const h=state.health[state.selected]||{};document.getElementById('view-saude').innerHTML=`<div class="card"><h2>Check-in de ${fmt(state.selected)}</h2><div class="grid"><label>Água (ml)<input class="input" type="number" value="${h.water||''}" onchange="setHealth('water',this.value)"></label><label>Treino feito<select class="input" onchange="setHealth('training',this.value)"><option value="">Não marcado</option><option ${h.training==='curto'?'selected':''} value="curto">Treino curto</option><option ${h.training==='mobilidade'?'selected':''} value="mobilidade">Mobilidade</option><option ${h.training==='caminhada'?'selected':''} value="caminhada">Caminhada</option><option ${h.training==='piscina'?'selected':''} value="piscina">Piscina</option></select></label></div><h3>Cafeína</h3><div class="row"><button class="btn small secondary" onclick="addCaffeine(60)">Espresso</button><button class="btn small secondary" onclick="addCaffeine(100)">Café pequeno</button><button class="btn small secondary" onclick="addCaffeine(160)">Café médio</button><button class="btn small secondary" onclick="addCaffeine(240)">Café grande</button><button class="btn small secondary" onclick="addCaffeine(80)">Energético</button></div><p>Total: <b>${h.caffeineMg||0} mg estimados</b></p><h3>Alimentação</h3><select class="input" id="mealType"><option>Café da manhã</option><option>Almoço</option><option>Jantar</option><option>Lanche</option><option>Ceia</option></select><textarea id="mealDesc" placeholder="Resumo da refeição"></textarea><button class="btn" onclick="addMeal()">Adicionar refeição</button>${(h.meals||[]).map(m=>`<div class="mealLine"><b>${m.type}</b> - ${m.desc}</div>`).join('')}</div>`}
window.setHealth=function(k,v){state.health[state.selected]=state.health[state.selected]||{};state.health[state.selected][k]=isNaN(+v)?v:+v;render()};window.addCaffeine=function(mg){state.health[state.selected]=state.health[state.selected]||{};state.health[state.selected].caffeineMg=(state.health[state.selected].caffeineMg||0)+mg;render()};window.addMeal=function(){state.health[state.selected]=state.health[state.selected]||{};const h=state.health[state.selected];h.meals=h.meals||[];h.meals.push({type:document.getElementById('mealType').value,desc:document.getElementById('mealDesc').value});render()}
function renderMeds(){const taken=state.medTaken[state.selected]||{};document.getElementById('view-medicacoes').innerHTML=`<div class="card"><h2>Medicações e suplementações</h2><div class="grid"><input class="input" id="medName" placeholder="Nome"><select class="input" id="medPeriod"><option>Manhã</option><option>Tarde</option><option>Noite</option><option>Ao acordar</option><option>Antes de dormir</option></select></div><button class="btn" onclick="addMed()">Adicionar e salvar favorito</button></div><div class="card"><h2>Checklist de ${fmt(state.selected)}</h2>${['Ao acordar','Manhã','Tarde','Noite','Antes de dormir'].map(p=>{const meds=state.meds.filter(m=>m.period===p);return meds.length?`<h3>${p}</h3>${meds.map(m=>`<label class="checkrow"><input type="checkbox" ${taken[m.name]?'checked':''} onchange="toggleMed('${m.name}',this.checked)"><div><b>${m.name}</b> <span class="pill ${m.status==='sensível'?'red':'green'}">${m.status||'compatível'}</span><br><span class="muted">${m.note||''}</span></div></label>`).join('')}`:''}).join('')}</div>`}
window.addMed=function(){const name=document.getElementById('medName').value.trim();if(!name)return;state.meds.push({name,period:document.getElementById('medPeriod').value,status:'compatível',note:'Favorito do usuário; revisar orientação individual.'});render()};window.toggleMed=function(n,v){state.medTaken[state.selected]=state.medTaken[state.selected]||{};state.medTaken[state.selected][n]=v;save()}
function renderDebug(){const r=currentRoster();document.getElementById('view-debug').innerHTML=`<div class="card"><h2>Modo teste dos motores</h2><p class="muted">Use para validar escalas antigas e futuras.</p><div class="debug">${escapeHtml((r.debug||[]).join('\n')||'Nenhum debug disponível.')}</div></div>`}
function escapeHtml(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
render();
</script>
