ontent:space-between;align-items:center;gap:12px}details>summary{font-size:22px;font-weight:900;cursor:pointer;margin-bottom:12px}.pill{display:inline-block;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:900;margin:2px;background:#eef0ef}.pill.blue{background:var(--bluebg);color:var(--blue)}.pill.green{background:var(--green);color:var(--ok)}.pill.yellow{background:var(--yellow);color:var(--warn)}.pill.red{background:var(--red);color:var(--bad)}.pill.gray{background:var(--gray);color:#777}.listrow{display:grid;grid-template-columns:110px 1.4fr 90px 90px 1.5fr;gap:10px;align-items:start;border-bottom:1px solid var(--line);padding:12px 0}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.dow{text-align:center;font-weight:900;font-size:12px;color:var(--muted)}.day{min-height:82px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:8px}.day.out{opacity:.35}.day.selected{outline:3px solid var(--brand)}.tag{display:inline-flex;margin-top:6px;border-radius:999px;padding:4px 7px;font-size:11px;font-weight:900}.tag.flight{background:var(--bluebg);color:var(--blue)}.tag.rest{background:var(--green);color:var(--ok)}.tag.none{background:var(--gray);color:#777}.alert{border-left:5px solid var(--warn);background:var(--yellow);padding:14px;border-radius:16px}.alert.bad{border-color:var(--bad);background:var(--red)}.hidden{display:none}.modal{position:fixed;inset:0;background:rgba(15,29,42,.45);display:flex;align-items:flex-end;justify-content:center;z-index:99;padding:14px}.modal.hidden{display:none}.modalCard{background:#fff;width:min(620px,100%);border-radius:22px;padding:18px;box-shadow:0 18px 60px rgba(0,0,0,.25)}.checkrow{display:flex;gap:12px;border:1px solid var(--line);border-radius:16px;padding:12px;margin:8px 0}.checkrow input{width:22px;height:22px}.medcard{border:1px solid var(--line);border-radius:16px;padding:12px;margin:8px 0}.section{display:none}.section.active{display:block}pre{white-space:pre-wrap;background:#0f1d2a;color:#e9f3f5;border-radius:14px;padding:14px;overflow:auto}@media(max-width:760px){.grid{grid-template-columns:repeat(2,1fr)}.listrow{grid-template-columns:1fr}.calendar{gap:5px}.day{min-height:68px;padding:6px}.tabs{overflow-x:auto}.tab{min-width:120px}.wrap{padding-bottom:105px}}
</style>
</head><body>
<div class="version" id="version">v5.4-parser-layout-core</div>
<header><div class="eyebrow">HealthOps Aeronautas</div><h1 id="pageTitle">Início operacional</h1><p id="pageSub">Base estável: parser → estado central → interface. Os módulos usam a mesma fonte de dados.</p></header>
<main class="wrap">
<section id="inicio" class="section active"></section>
<section id="escala" class="section"></section>
<section id="saude" class="section"></section>
<section id="medicacoes" class="section"></section>

</main>
<nav class="tabs" id="tabs"></nav>
<div class="modal hidden" id="modal"><div class="modalCard"><div class="between"><h3 id="modalTitle">Detalhes</h3><button class="btn secondary small" onclick="HealthOps.ui.closeModal()">Fechar</button></div><div id="modalBody"></div></div></div>
<script>
'use strict';
const VERSION='v5.4-parser-layout-core';
const HealthOps={
 state:{activeTab:'inicio',selectedMonth:null,imports:{},journeys:[],events:[],debug:[],meds:[],protocols:[],health:{water:0,caffeine:[],meals:[],sleep:[]}},
 refs:{},
 init(){this.refs.tabs=document.getElementById('tabs');this.refs.modal=document.getElementById('modal');this.storage.load();this.ui.renderTabs();this.ui.render();this.debug('init','Aplicação inicializada sem dependências globais antigas.');},
 debug(scope,msg,obj){const line={time:new Date().toLocaleTimeString(),scope,msg,obj:obj||null};this.state.debug.unshift(line);if(this.state.debug.length>150)this.state.debug.pop();},
 storage:{load(){try{const raw=localStorage.getItem('healthops.v5.state');if(raw){const s=JSON.parse(raw);Object.assign(HealthOps.state,s);}}catch(e){HealthOps.debug('storage','Falha ao carregar estado',String(e));}},save(){try{localStorage.setItem('healthops.v5.state',JSON.stringify(HealthOps.state));}catch(e){HealthOps.debug('storage','Falha ao salvar estado',String(e));}}},
 utils:{
  pad(n){return String(n).padStart(2,'0')},
  ym(d){return d.getFullYear()+'-'+this.pad(d.getMonth()+1)},
  dmy(d){return this.pad(d.getDate())+'/'+this.pad(d.getMonth()+1)},
  minToHH(m){if(m==null||isNaN(m))return '—';m=Math.round(m);const sign=m<0?'-':'';m=Math.abs(m);return sign+Math.floor(m/60)+'h'+this.pad(m%60)},
  parseDate(s){if(!s)return null;const mon={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};let m=s.match(/(\d{2})[-\/]([A-Za-z]{3})[-\/](\d{4})/);if(m)return new Date(+m[3],mon[m[2]],+m[1]);m=s.match(/(\d{2})\/(\d{2})\/(\d{4})/);if(m)return new Date(+m[3],+m[2]-1,+m[1]);return null;},
  parseTimeToken(tok,baseDate){if(!tok||!baseDate)return null;const m=String(tok).match(/(\d{1,2}):(\d{2})(?:\s*\(\+(\d+)\))?/);if(!m)return null;const d=new Date(baseDate.getFullYear(),baseDate.getMonth(),baseDate.getDate()+ (m[3]?+m[3]:0), +m[1], +m[2],0,0);return d;},
  diffHours(a,b){if(!a||!b)return null;return (b-a)/3600000;},
  classifyHotel(h){if(h==null)return {cls:'gray',txt:'Recup. n/d'};if(h<10)return {cls:'red',txt:`Hotel ${h.toFixed(1)}h · Crítica (<10h)`};if(h<12)return {cls:'yellow',txt:`Hotel ${h.toFixed(1)}h · Atenção (10–12h)`};return {cls:'green',txt:`Hotel ${h.toFixed(1)}h · Adequada`};}
 },
 parser:{
  async importFiles(files){
   const list=[...files];let total=0;
   for(const f of list){try{
     HealthOps.debug('parser',`Iniciando leitura: ${f.name}`);
     const text=await this.extractFile(f);
     if(!text || text.length<30) throw new Error('Texto extraído vazio ou insuficiente.');
     const kind=this.detectKind(text);
     const rows=this.normalizeText(text);
     const parsed=this.parseRoster(text,rows,f.name,kind);
     HealthOps.state.imports[parsed.monthKey]={...(HealthOps.state.imports[parsed.monthKey]||{}),[kind]:parsed,updated:new Date().toISOString()};
     total+=parsed.journeys.length;
     HealthOps.debug('parser',`Arquivo processado: ${f.name}`,{kind,month:parsed.monthKey,rows:rows.length,events:parsed.events.length,journeys:parsed.journeys.length});
   }catch(e){HealthOps.debug('parser',`Erro ao processar ${f.name}`,String(e && e.stack ? e.stack : e));}}
   this.rebuild();HealthOps.storage.save();HealthOps.ui.render();return total;
  },
  async extractFile(file){
   const name=(file.name||'').toLowerCase();
   if(file.type.includes('text')||name.endsWith('.txt')) return await file.text();
   if(file.type.includes('pdf')||name.endsWith('.pdf')) return await this.extractPdf(file);
   return await file.text();
  },
  async extractPdf(file){
   await this.ensurePdfJs();
   const buf=await file.arrayBuffer();
   const pdf=await pdfjsLib.getDocument({data:buf}).promise;
   let out=[];
   for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const content=await page.getTextContent();
    const items=content.items.map(it=>({x:it.transform[4],y:it.transform[5],str:(it.str||'').trim()})).filter(it=>it.str);
    if(!items.length)continue;
    // IFN/LATAM costuma vir como página rotacionada: o eixo X representa a linha visual e o eixo Y representa as colunas.
    // Para não perder a tabela, extraímos nos dois modos e escolhemos o que gera mais linhas operacionais reconhecíveis.
    const horizontal=this.extractRowsByAxis(items,'horizontal');
    const vertical=this.extractRowsByAxis(items,'vertical');
    const score=(rows)=>rows.reduce((n,r)=>n+(/\d{2}-[A-Za-z]{3}-\d{4}/.test(r)||/LA\d{4}/.test(r)||/(HSB|HSBE|ASB|DO|DR|VC|OFF)/.test(r)?1:0),0);
    const chosen=score(vertical)>=score(horizontal)?vertical:horizontal;
    out=out.concat(chosen);
   }
   return out.join('
');
  },
  extractRowsByAxis(items,mode){
   const vertical=mode==='vertical';
   const groups=[]; const tol=vertical?12:3.6;
   for(const it of items){
    const key=vertical?it.x:it.y;
    let g=groups.find(r=>Math.abs(r.key-key)<tol);
    if(!g){g={key,items:[]};groups.push(g);} g.items.push(it);
   }
   groups.sort((a,b)=>vertical?a.key-b.key:b.key-a.key);
   const rows=[];
   for(const g of groups){
    g.items.sort((a,b)=>vertical?b.y-a.y:a.x-b.x);
    const plain=g.items.map(i=>i.str).join(' ').replace(/\s+/g,' ').trim();
    const cols=['','','','','','','','','',''];
    for(const it of g.items){
     let c=-1;
     if(vertical){
      const y=it.y;
      if(y>1185)c=0;          // data
      else if(y>1110)c=1;     // dia da semana
      else if(y>1010)c=2;     // pairing/tipo
      else if(y>940)c=3;      // apresentação
      else if(y>850)c=4;      // voo/atividade
      else if(y>790)c=5;      // ignorar
      else if(y>720)c=6;      // OP/PS
      else if(y>630)c=7;      // origem + decolagem
      else if(y>535)c=8;      // destino + pouso/corte
      else if(y>465)c=9;      // fim jornada/debrief
      else c=-1;              // FH/DH/SDC/AC/Hotel ignorados
     }else{
      const x=it.x;
      if(x<105)c=0; else if(x<165)c=1; else if(x<270)c=2; else if(x<350)c=3; else if(x<455)c=4; else if(x<520)c=5; else if(x<570)c=6; else if(x<660)c=7; else if(x<750)c=8; else if(x<835)c=9; else c=-1;
     }
     if(c>=0)cols[c]+=(cols[c]?' ':'')+it.str;
    }
    // remove cabeçalhos de coluna, mas mantém Roster Report para identificação do período no texto geral
    rows.push('__ROW__'+cols.join('	')+'	__PLAIN__ '+plain);
   }
   return rows;
  },
  ensurePdfJs(){return new Promise((resolve,reject)=>{if(window.pdfjsLib){try{pdfjsLib.GlobalWorkerOptions.workerSrc=pdfjsLib.GlobalWorkerOptions.workerSrc||'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';}catch(e){} return resolve();}const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';s.onload=()=>{try{pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';}catch(e){} resolve();};s.onerror=()=>reject(new Error('Não foi possível carregar PDF.js. Confira internet/cache ou envie TXT.'));document.head.appendChild(s);});},
  detectKind(text){if(/Demonstrativo\s+Escala\s+Planejada/i.test(text))return 'comparativo'; if(/TIPO\s+DI[ÁA]RIA|VALOR\s+DI[ÁA]RIA/i.test(text))return 'diarias'; return 'escala';},
  normalizeText(text){return text.split(/\n+/).map(s=>s.trim()).filter(Boolean);},
  tokenIsTime(t){return /^\d{1,2}:\d{2}(?:\(\+\d+\))?$/.test(String(t||'').replace(/\s+/g,''));},
  tokenIsDate(t){return /^\d{2}-[A-Za-z]{3}-\d{4}$/.test(t)||/^\d{2}\/\d{2}\/\d{4}$/.test(t);},
  tokenIsFlight(t){return /^LA\d{4}$/.test(t);},
  isActivityToken(t){return /^LA\d{4}$/.test(t)||/^(ASB|HSB|HSBE|DO|DR|VC|OFF|R\d{3,4}|CRM\w*|CBF|EMER)$/i.test(t||'');},
  isPairingToken(t){return /^(LA\d{4}|ASB|HSBE?|R\d{3,4}|CRM\w*|CBF|EMER)[\w\-\/]*\/\d{6}\//i.test(t||'')||/^(DO|DR|VC|OFF)$/i.test(t||'');},
  parsePairDate(pair, fallback){
   const m=String(pair||'').match(/\/(\d{2})(\d{2})(\d{2})\//);
   if(m)return new Date(2000+Number(m[3]), Number(m[2])-1, Number(m[1]));
   return fallback;
  },
  parseAirportTime(s){
   const m=String(s||'').match(/\b([A-Z]{3})\s+(\d{1,2}:\d{2}(?:\(\+\d+\))?)/);
   return m?{ap:m[1],time:m[2]}:{ap:'',time:''};
  },
  mergeOD(a,b){a=a||{o:{},d:{}};b=b||{o:{},d:{}};return {o:{ap:(a.o&&a.o.ap)||(b.o&&b.o.ap)||'',time:(a.o&&a.o.time)||(b.o&&b.o.time)||''},d:{ap:(a.d&&a.d.ap)||(b.d&&b.d.ap)||'',time:(a.d&&a.d.time)||(b.d&&b.d.time)||''}};},
  releaseToken(col){const times=[...String(col||'').matchAll(/\d{1,2}:\d{2}(?:\(\+\d+\))?/g)].map(m=>m[0]);return times.find(t=>!/^0?0:00(?:\(\+\d+\))?$/.test(t))||'';},
  plainFromRow(raw){return raw.includes('__PLAIN__')?raw.split('__PLAIN__')[1].trim():raw;},
  parseRoster(text,rows,fileName,kind){
   let period=text.match(/(\d{2}-[A-Za-z]{3}-\d{4})\s*to\s*(\d{2}-[A-Za-z]{3}-\d{4})/i)||text.match(/(\d{2}-[A-Za-z]{3}-\d{4})to(\d{2}-[A-Za-z]{3}-\d{4})/i);
   let start=period?HealthOps.utils.parseDate(period[1]):new Date();
   let monthKey=HealthOps.utils.ym(start);
   let events=[], currentDate=start, currentPair='', pairDate=start, pendingOD=null;
   const structured=rows.some(r=>r.startsWith('__ROW__'));
   if(structured){
    for(const raw of rows){
     if(!raw.startsWith('__ROW__'))continue;
     let body=raw.slice(7), parts=body.split('\t');
     const cols=parts.slice(0,10).map(x=>String(x||'').replace(/\s+/g,' ').trim());
     const plain=this.plainFromRow(raw).replace(/\s*\(\+(\d+)\)/g,'(+$1)').trim();
     if(!plain || /^Roster Report|^Date\b/i.test(plain))continue;
     if(this.tokenIsDate(cols[0])) currentDate=HealthOps.utils.parseDate(cols[0]);
     // pairing pode estar quebrado entre linhas; use a parte que tem /DDMMYY/
     if(cols[2]){
      const pairMatch=cols[2].match(/(LA\d{4}|ASB|HSBE?|R\d{3,4}|CRM\w*|CBF|EMER)[\w\-\/]*\/\d{6}\//i) || cols[2].match(/\b(DO|DR|VC|OFF)\b/i);
      if(pairMatch){ currentPair=pairMatch[0].toUpperCase(); pairDate=this.parsePairDate(currentPair,currentDate)||currentDate; }
     }
     // linhas de origem/destino sem atividade costumam estar visualmente acima da linha do voo
     const preOD={o:this.parseAirportTime(cols[7]), d:this.parseAirportTime(cols[8])};
     if(!cols[4] && (preOD.o.ap||preOD.d.ap)){ pendingOD=preOD; continue; }
     const activity=(cols[4] || (['DO','DR','VC','OFF'].includes((cols[2]||'').toUpperCase())?cols[2]:'')).toUpperCase();
     if(!activity || !this.isActivityToken(activity))continue;
     if(['DO','DR','VC','OFF'].includes(activity)){
      events.push({date:currentDate.toISOString().slice(0,10),baseDate:currentDate.toISOString().slice(0,10),pairing:activity,activity,cond:'',origin:'',dest:'',report:null,dep:null,arr:null,release:null,sourceLine:plain});
      pendingOD=null; continue;
     }
     const base=pairDate||currentDate;
     const reportTok=(cols[3].match(/\d{1,2}:\d{2}(?:\(\+\d+\))?/)||[''])[0];
     const currentOD={o:this.parseAirportTime(cols[7]),d:this.parseAirportTime(cols[8])};
     const od=this.mergeOD(pendingOD,currentOD);
     const origin=od.o.ap, depTok=od.o.time, dest=od.d.ap, arrTok=od.d.time;
     const relTok=this.releaseToken(cols[9]);
     const cond=/^(OP|PS)$/i.test(cols[6])?cols[6].toUpperCase():'';
     const report=this.tokenIsTime(reportTok)?HealthOps.utils.parseTimeToken(reportTok,base):null;
     const dep=this.tokenIsTime(depTok)?HealthOps.utils.parseTimeToken(depTok,base):null;
     const arr=this.tokenIsTime(arrTok)?HealthOps.utils.parseTimeToken(arrTok,base):null;
     let release=this.tokenIsTime(relTok)?HealthOps.utils.parseTimeToken(relTok,base):null;
     if(!release && /^(ASB|HSB|HSBE|R\d{3,4}|CRM\w*|CBF|EMER)$/i.test(activity) && arr)release=arr;
     events.push({date:currentDate.toISOString().slice(0,10),baseDate:base.toISOString().slice(0,10),pairing:currentPair||activity,activity,cond,origin,depTok,dest,arrTok,relTok,reportTok,report,dep,arr,release,sourceLine:plain});
     pendingOD=null;
    }
   } else {
    // Fallback para texto colado: mantém comportamento anterior, mas com menos inferência.
    for(const raw of rows){
     let line=raw.replace(/\s*\(\+(\d+)\)/g,'(+$1)').trim();
     const tokens=line.split(/\s+/).filter(Boolean); if(!tokens.length)continue;
     let idx=0; if(this.tokenIsDate(tokens[0])){currentDate=HealthOps.utils.parseDate(tokens[0]);idx=1;}
     const pairPos=tokens.findIndex(t=>this.isPairingToken(t)); if(pairPos>=0){currentPair=tokens[pairPos].toUpperCase();pairDate=this.parsePairDate(currentPair,currentDate)||currentDate;}
     const actIdx=tokens.findIndex(t=>this.isActivityToken(t)&&!String(t).includes('/')); if(actIdx<0)continue;
     const activity=tokens[actIdx].toUpperCase();
     if(['DO','DR','VC','OFF'].includes(activity)){events.push({date:currentDate.toISOString().slice(0,10),baseDate:currentDate.toISOString().slice(0,10),pairing:activity,activity,cond:'',origin:'',dest:'',report:null,dep:null,arr:null,release:null,sourceLine:line});continue;}
     const reportTok=[...tokens.slice(0,actIdx)].reverse().find(t=>this.tokenIsTime(t))||'';
     const condIdx=tokens.findIndex((t,i)=>i>actIdx&&/^(OP|PS)$/i.test(t));
     const cond=condIdx>0?tokens[condIdx].toUpperCase():'';
     const tail=tokens.slice(condIdx>0?condIdx+1:actIdx+1).join(' ');
     const ads=[...tail.matchAll(/\b([A-Z]{3})\s+(\d{1,2}:\d{2}(?:\(\+\d+\))?)/g)].map(m=>({ap:m[1],time:m[2]}));
     const origin=ads[0]?.ap||'', depTok=ads[0]?.time||'', dest=ads[1]?.ap||'', arrTok=ads[1]?.time||'';
     const times=[...tail.matchAll(/\d{1,2}:\d{2}(?:\(\+\d+\))?/g)].map(m=>m[0]);
     const relTok=times.find((t,i)=>i>1 && !/^0?0:00(?:\(\+\d+\))?$/.test(t))||''; const base=pairDate||currentDate;
     events.push({date:currentDate.toISOString().slice(0,10),baseDate:base.toISOString().slice(0,10),pairing:currentPair||activity,activity,cond,origin,depTok,dest,arrTok,relTok,reportTok,report:this.tokenIsTime(reportTok)?HealthOps.utils.parseTimeToken(reportTok,base):null,dep:this.tokenIsTime(depTok)?HealthOps.utils.parseTimeToken(depTok,base):null,arr:this.tokenIsTime(arrTok)?HealthOps.utils.parseTimeToken(arrTok,base):null,release:this.tokenIsTime(relTok)?HealthOps.utils.parseTimeToken(relTok,base):null,sourceLine:line});
    }
   }
   const journeys=this.buildJourneys(events);
   return {fileName,kind,monthKey,period:{start:start.toISOString().slice(0,10),end:period?HealthOps.utils.parseDate(period[2]).toISOString().slice(0,10):null},events,journeys,raw:text.slice(0,6000)};
  },
  buildJourneys(events){
   const js=[];let cur=null;
   for(const e of events){
    const isRest=['DO','DR','VC','OFF'].includes(e.activity);
    const isFlight=/^LA\d{4}/.test(e.activity);
    const isReserve=['ASB','HSB','HSBE'].includes(e.activity);
    const isTraining=/^R|CRM|CBF|EMER/.test(e.activity);
    if(isRest){if(cur){js.push(this.finishJourney(cur));cur=null;}continue;}
    const startsNew=!!e.report || !cur || isReserve || isTraining;
    if(startsNew){if(cur)js.push(this.finishJourney(cur));cur={type:isFlight?'Jornada de voo':isReserve?'Reserva/Sobreaviso':'Treinamento',start:e.report||e.dep||new Date(e.baseDate+'T00:00:00'),events:[],flights:[],release:null};}
    cur.events.push(e);if(isFlight)cur.flights.push(e);if(e.release)cur.release=e.release;else if(e.arr)cur.lastArr=e.arr;
    if(isReserve||isTraining){cur.release=e.release||e.arr||e.dep||cur.start;js.push(this.finishJourney(cur));cur=null;}
   }
   if(cur)js.push(this.finishJourney(cur));
   return js.filter(j=>j.start&&j.end&&isFinite(j.dutyHours)&&j.dutyHours>=0&&j.dutyHours<30);
  },
  finishJourney(j){
   const lastFlight=j.flights[j.flights.length-1];
   let end=j.release;
   const lastArr=lastFlight?.arr || j.lastArr;
   if(!end && lastArr) end=new Date(lastArr.getTime()+30*60000);
   if(lastFlight && /^LA8/.test(lastFlight.activity) && end && lastArr && (end-lastArr)<40*60000) end=new Date(lastArr.getTime()+45*60000);
   if(lastFlight && !/^LA8/.test(lastFlight.activity) && end && lastArr && (end-lastArr)<25*60000) end=new Date(lastArr.getTime()+30*60000);
   if(!end)end=j.start;
   const fh=j.flights.reduce((s,f)=>s+(f.dep&&f.arr?Math.max(0,(f.arr-f.dep)/3600000):0),0);
   return {...j,end,flightHours:fh,dutyHours:(end-j.start)/3600000,labels:j.flights.map(f=>f.activity),date:j.start.toISOString().slice(0,10)};
  },
  rebuild(){
   const imports=Object.values(HealthOps.state.imports);let journeys=[];let events=[];
   for(const imp of imports){const p=imp.escala||imp.executada||imp.publicada; if(p){journeys=journeys.concat(p.journeys||[]);events=events.concat(p.events||[]);}}
   journeys.sort((a,b)=>new Date(a.start)-new Date(b.start));
   for(let i=0;i<journeys.length;i++){const next=journeys[i+1];journeys[i].restNext=next?HealthOps.utils.diffHours(new Date(journeys[i].end),new Date(next.start)):null;journeys[i].hotelEst=journeys[i].restNext==null?null:Math.max(0,journeys[i].restNext-2.5);}
   HealthOps.state.journeys=journeys;HealthOps.state.events=events;
  }

  inicio(){const el=document.getElementById('inicio');const js=HealthOps.state.journeys;const now=new Date();const next=js.find(j=>new Date(j.end)>now)||js[0];el.innerHTML=`<div class="grid"><div class="card"><b>Jornadas</b><div class="metric">${js.length}</div><span class="muted">processadas</span></div><div class="card"><b>Tempo de voo</b><div class="metric">${js.reduce((s,j)=>s+j.flightHours,0).toFixed(1)}h</div></div><div class="card"><b>Jornada</b><div class="metric">${js.reduce((s,j)=>s+j.dutyHours,0).toFixed(1)}h</div></div><div class="card"><b>Próxima</b><div class="metric">${next?HealthOps.utils.dmy(new Date(next.start)):'—'}</div></div></div><div class="card"><h2>Leitura operacional</h2><p>O HealthOps v5 usa estado central: a escala importada alimenta calendário, regulamentação, descanso, treino, diárias e saúde sem cada tela reinterpretar o PDF.</p>${next?`<div class="alert"><b>Próxima jornada:</b> ${next.labels.join(', ')||next.type} · início ${new Date(next.start).toLocaleString()} · fim ${new Date(next.end).toLocaleString()}</div>`:''}</div>`;},
  escala(){const el=document.getElementById('escala');const js=HealthOps.state.journeys;el.innerHTML=`<div class="card"><h2>Importar documentos operacionais</h2><p>Selecione um ou vários PDFs/TXT de escala publicada ou executada. O nome do arquivo é ignorado; a identificação é feita pelo conteúdo.</p><input class="input" id="fileInput" type="file" multiple accept=".pdf,.txt,application/pdf,text/plain"><div class="row" style="margin-top:10px"><button class="btn" id="processBtn">Processar e salvar</button><button class="btn danger" id="clearBtn">Limpar importações</button></div><p class="muted">${js.length} jornadas processadas.</p></div><details class="card" open><summary>1. Jornada do mês</summary>${this.journeyTable(js)}</details><details class="card"><summary>2. Calendário</summary>${this.calendar(js)}</details><details class="card"><summary>3. Diárias estimadas</summary>${this.perdiem(js)}</details>`;document.getElementById('processBtn').onclick=async()=>{const f=document.getElementById('fileInput').files;if(!f.length)return this.openModal('Importação','Selecione ao menos um arquivo.');document.getElementById('processBtn').disabled=true;await HealthOps.parser.importFiles(f);document.getElementById('processBtn').disabled=false;};document.getElementById('clearBtn').onclick=()=>{HealthOps.state.imports={};HealthOps.state.journeys=[];HealthOps.state.events=[];HealthOps.storage.save();this.render();};},
  journeyTable(js){if(!js.length)return '<p class="muted">Nenhuma jornada processada.</p>';return js.map((j,i)=>{const hotel=HealthOps.utils.classifyHotel(j.hotelEst);return `<div class="listrow"><b>${new Date(j.start).toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit'})}</b><div><b>${j.type}</b><br><span class="muted">Apres. ${new Date(j.start).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})} · Fim ${new Date(j.end).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</span><br><span class="pill ${hotel.cls}">${hotel.txt}</span></div><div>${j.dutyHours.toFixed(1)}h</div><div>${j.flightHours.toFixed(1)}h</div><div>${j.labels.map(x=>`<span class="pill blue" onclick="HealthOps.ui.openModal('Voo ${x}','${this.flightDetails(j,x).replace(/'/g,'&apos;')}')">${x}</span>`).join('')}</div></div>`}).join('');},

  calendar(js){const base=js[0]?new Date(js[0].start):new Date();const y=base.getFullYear(),m=base.getMonth();const first=new Date(y,m,1);const start=new Date(y,m,1-first.getDay());let html='<div class="calendar">'+['D','S','T','Q','Q','S','S'].map(d=>`<div class="dow">${d}</div>`).join('');for(let i=0;i<42;i++){const d=new Date(start.getFullYear(),start.getMonth(),start.getDate()+i);const dayJs=js.filter(j=>new Date(j.start).toDateString()===d.toDateString());html+=`<div class="day ${d.getMonth()!=m?'out':''}"><b>${d.getDate()}</b><br>${dayJs.length?`<span class="tag flight">${dayJs.length} jorn.</span>`:`<span class="tag none">Sem dados</span>`}</div>`;}return html+'</div>';},
