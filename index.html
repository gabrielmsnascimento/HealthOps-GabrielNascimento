const HealthOps={

 utils:{pad:n=>String(n).padStart(2,'0'),dateKey(d){return d.getFullYear()+'-'+this.pad(d.getMonth()+1)+'-'+this.pad(d.getDate())},monthKey(d){return d.getFullYear()+'-'+this.pad(d.getMonth()+1)},dmy(d){return this.pad(d.getDate())+'/'+this.pad(d.getMonth()+1)},hm(d){return d?d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'—'},parseDate(s){let m=String(s||'').match(/(\d{2})[-/]([A-Za-z]{3})[-/](\d{4})/);if(m)return new Date(+m[3],MONTHS[m[2]],+m[1]);m=String(s||'').match(/(\d{2})\/(\d{2})\/(\d{4})/);if(m)return new Date(+m[3],+m[2]-1,+m[1]);return null;},parsePairDate(pair, fallback){const m=String(pair||'').match(/\/(\d{2})(\d{2})(\d{2})\//);if(m)return new Date(2000+Number(m[3]),Number(m[2])-1,Number(m[1]));return fallback;},parseTime(tok,currentDate,pairDate){if(!tok)return null;const m=String(tok).replace(/\s+/g,'').match(/(\d{1,2}):(\d{2})(?:\(\+(\d+)\))?/);if(!m)return null;const base=m[3]&&pairDate?pairDate:currentDate;return new Date(base.getFullYear(),base.getMonth(),base.getDate()+(m[3]?Number(m[3]):0),Number(m[1]),Number(m[2]));},diffH(a,b){return (b-a)/3600000},classHotel(h){if(h==null)return ['gray','Recup. n/d'];if(h<10)return ['red',`Hotel ${h.toFixed(1)}h · Crítica (<10h)`];if(h<12)return ['yellow',`Hotel ${h.toFixed(1)}h · Atenção`];return ['green',`Hotel ${h.toFixed(1)}h · Adequada`];}},

  async parseFile(file){const name=(file.name||'').toLowerCase();let table=[],text='';if(name.endsWith('.pdf')||file.type.includes('pdf')){const res=await this.extractPdfTable(file);table=res.table;text=res.text;}else{text=await file.text();table=this.textRows(text).map(r=>({text:r,cols:null}));}

  async ensurePdf(){if(!window.pdfjsLib)throw new Error('PDF.js não carregou. Confira conexão ou recarregue a página.');pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';},
  async extractPdfTable(file){await this.ensurePdf();const buf=await file.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:buf}).promise;let all=[],textParts=[];for(let p=1;p<=pdf.numPages;p++){const page=await pdf.getPage(p);const content=await page.getTextContent();const items=content.items.map(it=>({x:it.transform[4],y:it.transform[5],str:(it.str||'').trim()})).filter(it=>it.str);const rows=this.itemsToRows(items);all=all.concat(rows);textParts.push(rows.map(r=>r.text).join('\n'));}return {table:all,text:textParts.join('\n')};},
  itemsToRows(items){const rows=[];items.sort((a,b)=>b.y-a.y||a.x-b.x);for(const it of items){let r=rows.find(row=>Math.abs(row.y-it.y)<4);if(!r){r={y:it.y,items:[]};rows.push(r);}r.items.push(it);}rows.sort((a,b)=>b.y-a.y);return rows.map(r=>{r.items.sort((a,b)=>a.x-b.x);const cols=this.assignCols(r.items);return {text:r.items.map(i=>i.str).join(' ').replace(/\s+/g,' ').trim(),cols,y:r.y};}).filter(r=>r.text);},
  assignCols(items){const cols=Array(10).fill('');const boundaries=[0,78,155,265,335,438,500,565,655,745,840,1300];for(const it of items){let c=0;for(let i=0;i<boundaries.length-1;i++){if(it.x>=boundaries[i]&&it.x<boundaries[i+1]){c=i;break;}}if(c>9)c=9;cols[c]=(cols[c]+' '+it.str).trim();}return cols;},
  textRows(text){return String(text||'').split(/\n+/).map(s=>s.trim()).filter(Boolean);},

  parseTable(table,text,fileName){const period=String(text).match(/(\d{2}-[A-Za-z]{3}-\d{4})\s*to\s*(\d{2}-[A-Za-z]{3}-\d{4})/i);const start=period?HealthOps.utils.parseDate(period[1]):this.firstDate(table)||new Date();const monthKey=HealthOps.utils.monthKey(start);const kind=this.detectKind(text);let currentDate=start,currentPair='',pairDate=start,pairingBuffer='',events=[];
   for(let idx=0;idx<table.length;idx++){let row=table[idx];let cols=row.cols?[...row.cols]:null;let line=row.text.replace(/\s+\(\+(\d+)\)/g,'(+$1)').replace(/\s+/g,' ').trim();if(!line||/^(Roster|Report|Date |Pairing|Activity|Opt Rank|DH :|FH :)/i.test(line))continue;

    if(cols){

      pairing=(cols[2]||'').replace(/\s+/g,'').toUpperCase();
      if(pairing && /LA\d{4}\/?\d{6}\/?/.test(pairing) && table[idx+1] && table[idx+1].cols && /^JJCC/i.test((table[idx+1].text||'').trim())){pairing+=table[idx+1].text.trim().replace(/\s+/g,'');}
      reportTok=this.timeFrom(cols[3]);

      cond=(cols[6]||'').trim().toUpperCase();
      const od1=this.airTime(cols[7]);const od2=this.airTime(cols[8]);origin=od1.ap;depTok=od1.time;dest=od2.ap;arrTok=od2.time;relTok=this.timeFrom(cols[9]);
    }

      const pair=line.match(/LA\d{4}\/\d{6}\/[A-Z0-9-]+/i);pairing=pair?pair[0].toUpperCase():'';

      const aps=[...after.matchAll(/\b([A-Z]{3})\s+(\d{1,2}:\d{2}(?:\(\+\d+\))?)/g)];if(aps[0]){origin=aps[0][1];depTok=aps[0][2];}if(aps[1]){dest=aps[1][1];arrTok=aps[1][2];}
      const times=[...after.matchAll(/\d{1,2}:\d{2}(?:\(\+\d+\))?/g)].map(m=>m[0]);relTok=times.find((t,i)=>i>1&&!/^0?0:00(?:\(\+\d+\))?$/.test(t))||'';
    }

    const basePair=pairDate||currentDate;const report=HealthOps.utils.parseTime(reportTok,currentDate,basePair);const dep=HealthOps.utils.parseTime(depTok,currentDate,basePair);const arr=HealthOps.utils.parseTime(arrTok,currentDate,basePair);let release=HealthOps.utils.parseTime(relTok,currentDate,basePair);

   }
   const journeys=this.buildJourneys(events);return {fileName,kind,monthKey,period:{start:HealthOps.utils.dateKey(start),end:period?HealthOps.utils.dateKey(HealthOps.utils.parseDate(period[2])):null},events,journeys,raw:text.slice(0,8000)};},
  firstDate(table){for(const r of table){const m=r.text.match(/\d{2}-[A-Za-z]{3}-\d{4}/);if(m)return HealthOps.utils.parseDate(m[0]);}return null;},timeFrom(s){const m=String(s||'').match(/\d{1,2}:\d{2}(?:\(\+\d+\))?/);return m?m[0]:'';},airTime(s){const m=String(s||'').match(/\b([A-Z]{3})\s+(\d{1,2}:\d{2}(?:\(\+\d+\))?)/);return {ap:m?m[1]:'',time:m?m[2]:''};},

  specialType(a){if(['HSB','HSBE','ASB'].includes(a))return 'Reserva/Sobreaviso';return 'Treinamento';},
  finish(j){const last=j.flights[j.flights.length-1];const lastArr=last?.arr||j.lastArr||j.start;let end=j.release;if(!end&&lastArr)end=new Date(lastArr.getTime()+30*60000);if(last&&/^LA8/.test(last.activity)&&end-lastArr<40*60000)end=new Date(lastArr.getTime()+45*60000);if(last&&!/^LA8/.test(last.activity)&&end-lastArr<25*60000)end=new Date(lastArr.getTime()+30*60000);const flightHours=j.flights.reduce((s,f)=>s+(f.dep&&f.arr?Math.max(0,HealthOps.utils.diffH(f.dep,f.arr)):0),0);return {...j,end,flightHours,dutyHours:HealthOps.utils.diffH(j.start,end),labels:j.events.map(e=>e.activity),date:HealthOps.utils.dateKey(j.start)};},
  rebuild(){let journeys=[],events=[];Object.values(HealthOps.state.imports).forEach(i=>{const p=i.escala||i.publicada||i.executada;if(p){journeys=journeys.concat(p.journeys||[]);events=events.concat(p.events||[]);}});journeys.sort((a,b)=>new Date(a.start)-new Date(b.start));for(let i=0;i<journeys.length;i++){const next=journeys[i+1];journeys[i].restNext=next?HealthOps.utils.diffH(new Date(journeys[i].end),new Date(next.start)):null;journeys[i].hotelEst=journeys[i].restNext==null?null:Math.max(0,journeys[i].restNext-2.5);}HealthOps.state.journeys=journeys;HealthOps.state.events=events;}
 },
 ui:{tabs:[['inicio','Início'],['escala','Escala'],['saude','Saúde'],['medicacoes','Medicações'],['relatorio','Relatório'],['validacao','Validação'],['debug','Debug']],renderTabs(){HealthOps.refs.tabs.innerHTML=this.tabs.map(([id,label])=>`<button class="tab ${HealthOps.state.activeTab===id?'active':''}" data-tab="${id}">${label}</button>`).join('');HealthOps.refs.tabs.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{HealthOps.state.activeTab=b.dataset.tab;HealthOps.storage.save();this.render();});},render(){document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id===HealthOps.state.activeTab));this.renderTabs();document.getElementById('pageTitle').textContent={inicio:'Início operacional',escala:'Escala operacional',saude:'Saúde operacional',medicacoes:'Medicações e suplementações',relatorio:'Relatório',validacao:'Validação do parser',debug:'Debug'}[HealthOps.state.activeTab];try{this[HealthOps.state.activeTab]();}catch(e){document.getElementById(HealthOps.state.activeTab).innerHTML=`<div class="card"><h2>Erro nesta aba</h2><pre>${e.stack||e}</pre></div>`;HealthOps.debug('ui','Erro render',String(e.stack||e));}},openModal(t,b){document.getElementById('modalTitle').textContent=t;document.getElementById('modalBody').innerHTML=b;HealthOps.refs.modal.classList.remove('hidden');},closeModal(){HealthOps.refs.modal.classList.add('hidden');},
  inicio(){const js=HealthOps.state.journeys;const next=js.find(j=>new Date(j.end)>new Date())||js[0];document.getElementById('inicio').innerHTML=`<div class="grid"><div class="card"><b>Jornadas</b><div class="metric">${js.length}</div><span class="muted">processadas</span></div><div class="card"><b>Tempo de voo</b><div class="metric">${js.reduce((s,j)=>s+j.flightHours,0).toFixed(1)}h</div></div><div class="card"><b>Jornada</b><div class="metric">${js.reduce((s,j)=>s+j.dutyHours,0).toFixed(1)}h</div></div><div class="card"><b>Próxima</b><div class="metric">${next?HealthOps.utils.dmy(new Date(next.start)):'—'}</div></div></div><div class="card"><h2>Leitura operacional</h2><p>Importe a escala publicada/executada. O sistema lê as colunas visuais do PDF e reconstrói jornadas por apresentação, decolagem, pouso/corte e fim de jornada.</p>${next?`<div class="alert"><b>Próxima jornada:</b> ${next.labels.join(', ')} · ${new Date(next.start).toLocaleString()} → ${new Date(next.end).toLocaleString()}</div>`:''}</div>`;},
  escala(){const js=HealthOps.state.journeys;document.getElementById('escala').innerHTML=`<div class="card"><h2>Importar documentos operacionais</h2><p>Selecione um ou vários PDFs/TXT de escala publicada ou executada. Nome do arquivo é ignorado.</p><input class="input" id="fileInput" type="file" multiple accept=".pdf,.txt,application/pdf,text/plain"><div class="row" style="margin-top:10px"><button class="btn" id="processBtn">Processar e salvar</button><button class="btn danger" id="clearBtn">Limpar importações</button></div><p class="muted">${js.length} jornadas processadas.</p></div><details class="card" open><summary>1. Jornada do mês</summary>${this.journeyTable(js)}</details><details class="card"><summary>2. Calendário</summary>${this.calendar(js)}</details><details class="card"><summary>3. Diárias estimadas</summary>${this.perdiem(js)}</details>`;document.getElementById('processBtn').onclick=async()=>{const f=document.getElementById('fileInput').files;if(!f.length)return this.openModal('Importação','Selecione ao menos um arquivo.');document.getElementById('processBtn').disabled=true;await HealthOps.parser.importFiles(f);document.getElementById('processBtn').disabled=false;};document.getElementById('clearBtn').onclick=()=>{HealthOps.state.imports={};HealthOps.state.journeys=[];HealthOps.state.events=[];HealthOps.storage.save();this.render();};},
  journeyTable(js){if(!js.length)return '<p class="muted">Nenhuma jornada processada.</p>';return js.map(j=>{const h=HealthOps.utils.classHotel(j.hotelEst);return `<div class="listrow"><b>${new Date(j.start).toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit'})}</b><div><b>${j.type}</b><br><span class="muted">Apres. ${HealthOps.utils.hm(new Date(j.start))} · Fim ${HealthOps.utils.hm(new Date(j.end))}</span><br><span class="pill ${h[0]}">${h[1]}</span></div><div>${j.dutyHours.toFixed(1)}h</div><div>${j.flightHours.toFixed(1)}h</div><div>${j.labels.map(x=>`<span class="pill blue">${x}</span>`).join('')}</div></div>`}).join('');},
  calendar(js){const base=js[0]?new Date(js[0].start):new Date();const y=base.getFullYear(),m=base.getMonth();const first=new Date(y,m,1);const start=new Date(y,m,1-first.getDay());let html='<div class="calendar">'+['D','S','T','Q','Q','S','S'].map(d=>`<div class="dow">${d}</div>`).join('');for(let i=0;i<42;i++){const d=new Date(start.getFullYear(),start.getMonth(),start.getDate()+i);const dayJs=js.filter(j=>new Date(j.start).toDateString()===d.toDateString());html+=`<div class="day ${d.getMonth()!=m?'out':''}"><b>${d.getDate()}</b><br>${dayJs.length?`<span class="tag flight">${dayJs.length} jorn.</span>`:`<span class="tag none">Sem dados</span>`}</div>`;}return html+'</div>';},
  perdiem(js){if(!js.length)return '<p class="muted">Sem dados.</p>';const items=[];for(const j of js){const away=j.flights.some(f=>f.origin&&f.origin!=='BSB')||j.flights.some(f=>f.dest&&f.dest!=='BSB');if(away)items.push(`${HealthOps.utils.dmy(new Date(j.start))} · ${j.labels.join(', ')} · verificar almoço/jantar/ceia conforme janela operacional`);}return items.length?items.map(x=>`<div class="medcard">${x}</div>`).join(''):'<p class="muted">Nenhuma diária estimada.</p>';},
  saude(){const h=HealthOps.state.health;document.getElementById('saude').innerHTML=`<div class="grid"><div class="card"><b>Água</b><div class="metric">${h.water||0}ml</div><div class="row"><button class="btn small" onclick="HealthOps.state.health.water=Math.max(0,(HealthOps.state.health.water||0)-250);HealthOps.storage.save();HealthOps.ui.render()">-250</button><button class="btn small" onclick="HealthOps.state.health.water=(HealthOps.state.health.water||0)+250;HealthOps.storage.save();HealthOps.ui.render()">+250</button></div></div><div class="card"><b>Cafeína</b><div class="metric">${(h.caffeine||[]).length}</div></div><div class="card"><b>Refeições</b><div class="metric">${(h.meals||[]).length}</div></div><div class="card"><b>Sono</b><div class="metric">${(h.sleep||[]).length}</div></div></div><div class="card"><h2>Check-in rápido</h2><div class="row"><input class="input" id="mealTxt" placeholder="Resumo de refeição, cafeína, sintomas ou sono"><button class="btn" onclick="const v=document.getElementById('mealTxt').value.trim();if(v){HealthOps.state.health.meals.push({date:new Date().toISOString(),text:v});HealthOps.storage.save();HealthOps.ui.render()}">Adicionar</button></div></div>`;},
  medicacoes(){const saved=HealthOps.state.meds||[];document.getElementById('medicacoes').innerHTML=`<div class="card"><h2>Adicionar medicação/suplemento</h2><input class="input" id="medSearch" placeholder="Digite nome, princípio ativo, classe ou finalidade"><div id="medResults"></div></div><div class="card"><h2>Checklist / protocolo pessoal</h2>${saved.length?saved.map((m,i)=>`<div class="checkrow"><input type="checkbox" ${m.done?'checked':''} onchange="HealthOps.state.meds[${i}].done=this.checked;HealthOps.storage.save()"><div><b>${m.name}</b> <span class="pill ${m.status==='sensível'?'yellow':m.status==='proibido'?'red':'green'}">${m.status}</span><br><span class="muted">${m.dose||''} · ${m.schedule||''}</span><br><button class="btn secondary small" onclick="HealthOps.state.meds.splice(${i},1);HealthOps.storage.save();HealthOps.ui.render()">Remover</button></div></div>`).join(''):'<p class="muted">Nenhum item salvo.</p>'}</div>`;const inp=document.getElementById('medSearch');const render=()=>{const q=inp.value.toLowerCase();const arr=MEDS.filter(m=>(m.name+' '+m.class+' '+m.use+' '+m.active).toLowerCase().includes(q)).slice(0,30);document.getElementById('medResults').innerHTML=arr.map((m,idx)=>`<div class="medcard"><b>${m.name}</b> <span class="pill ${m.status==='sensível'?'yellow':m.status==='proibido'?'red':'green'}">${m.status}</span><br><span class="muted">${m.class} · ${m.use} · ${m.active}</span><div class="row" style="margin-top:8px"><select id="dose${idx}" class="input" style="max-width:190px">${m.doses.map(d=>`<option>${d}</option>`).join('')}</select><select id="sched${idx}" class="input" style="max-width:190px">${m.schedules.map(d=>`<option>${d}</option>`).join('')}</select><button class="btn small" onclick="HealthOps.state.meds.push({name:'${m.name}',status:'${m.status}',dose:document.getElementById('dose${idx}').value,schedule:document.getElementById('sched${idx}').value,done:false});HealthOps.storage.save();HealthOps.ui.render()">Adicionar</button></div></div>`).join('');};inp.oninput=render;render();},
  relatorio(){document.getElementById('relatorio').innerHTML=`<div class="card"><h2>Relatório operacional</h2><p>Base para dossiê mensal de sono, hidratação, cafeína, alimentação, treino e escala.</p><button class="btn" onclick="window.print()">Salvar / imprimir PDF</button></div>`;},
  validacao(){const imports=Object.values(HealthOps.state.imports);document.getElementById('validacao').innerHTML=`<div class="card"><h2>Parser Validation Suite</h2>${imports.map(i=>{const p=i.escala||i.publicada||i.executada;return p?`<div class="medcard"><b>${p.fileName}</b><br>Mês: ${p.monthKey}<br>Eventos: ${p.events.length}<br>Jornadas: ${p.journeys.length}</div>`:''}).join('')||'<p class="muted">Sem importações.</p>'}</div>`;},
  debug(){document.getElementById('debug').innerHTML=`<div class="card"><h2>Debug</h2><button class="btn danger" onclick="localStorage.removeItem('healthops.v55.state');location.reload()">Resetar app</button><pre>${HealthOps.state.debug.map(d=>`[${d.time}] ${d.scope}: ${d.msg}${d.obj?'\n'+JSON.stringify(d.obj,null,2):''}`).join('\n\n')}</pre></div>`;}
 }
};
window.HealthOps=HealthOps;HealthOps.init();
</script>
