<style>
:root{--bg:#f4f1eb;--card:#fff;--ink:#0f1d2a;--muted:#68727d;--line:#ddd6cb;--brand:#23404a;--copper:#b06d42;--ok:#2e7d52;--warn:#b97910;--bad:#a33a3a;--blue:#2f6f9f;--green:#eaf7ee;--yellow:#fff4cd;--red:#faeaea;--bluebg:#eaf4fb;--gray:#f1f1ee}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}.version{position:fixed;right:12px;top:12px;background:var(--brand);color:#fff;padding:8px 12px;border-radius:999px;font-weight:900;font-size:12px;z-index:30}header{max-width:1180px;margin:auto;padding:24px 18px 8px}.eyebrow{font-size:12px;font-weight:900;letter-spacing:.14em;color:var(--copper);text-transform:uppercase}h1{font-size:clamp(34px,5vw,60px);line-height:.95;margin:8px 0 8px}h2{margin-top:0}p,.muted{color:var(--muted)}.wrap{max-width:1180px;margin:auto;padding:0 16px 96px}.tabs{position:fixed;bottom:0;left:0;right:0;background:rgba(244,241,235,.96);backdrop-filter:blur(10px);display:flex;gap:8px;padding:10px;border-top:1px solid var(--line);z-index:20}.tab{flex:1;border:0;background:#e9e6df;color:#67635d;border-radius:16px;padding:14px 8px;font-weight:900;cursor:pointer}.tab.active{background:var(--brand);color:#fff}.section{display:none}.section.active{display:block}.card{background:var(--card);border-radius:22px;padding:18px;border:1px solid rgba(0,0,0,.06);box-shadow:0 10px 30px rgba(0,0,0,.05);margin-bottom:14px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.metric{font-size:34px;font-weight:900;color:#153846}.btn{border:0;background:var(--brand);color:#fff;border-radius:14px;padding:12px 16px;font-weight:900;cursor:pointer;min-height:44px}.btn.secondary{background:#e9e6df;color:var(--ink)}.btn.danger{background:#a83d3d}.btn.small{padding:7px 10px;min-height:34px;font-size:12px}.input,textarea,select,input[type=file]{width:100%;border:1px solid #cfc8bd;border-radius:14px;padding:12px;font:inherit;background:#fff}textarea{min-height:150px}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.between{display:flex;justify-content:space-between;align-items:center;gap:12px}details>summary{font-size:22px;font-weight:900;cursor:pointer;margin-bottom:12px}.pill{display:inline-block;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:900;margin:2px;background:#eef0ef}.pill.blue{background:var(--bluebg);color:var(--blue)}.pill.green{background:var(--green);color:var(--ok)}.pill.yellow{background:var(--yellow);color:var(--warn)}.pill.red{background:var(--red);color:var(--bad)}.pill.gray{background:var(--gray);color:#777}.listrow{display:grid;grid-template-columns:110px 1.4fr 90px 90px 1.8fr;gap:10px;align-items:start;border-bottom:1px solid var(--line);padding:12px 0}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.dow{text-align:center;font-weight:900;font-size:12px;color:var(--muted)}.day{min-height:82px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:8px}.tag{display:inline-flex;margin-top:6px;border-radius:999px;padding:4px 7px;font-size:11px;font-weight:900}.tag.flight{background:var(--bluebg);color:var(--blue)}.tag.rest{background:var(--green);color:var(--ok)}.tag.none{background:var(--gray);color:#777}.alert{border-left:5px solid var(--warn);background:var(--yellow);padding:14px;border-radius:16px}.alert.bad{border-color:var(--bad);background:var(--red)}pre{white-space:pre-wrap;background:#0f1d2a;color:#e9f3f5;border-radius:14px;padding:14px;overflow:auto}.checkrow{display:flex;gap:12px;border:1px solid var(--line);border-radius:16px;padding:12px;margin:8px 0}.checkrow input{width:22px;height:22px}.medcard{border:1px solid var(--line);border-radius:16px;padding:12px;margin:8px 0}.modal{position:fixed;inset:0;background:rgba(15,29,42,.45);display:none;align-items:flex-end;justify-content:center;z-index:99;padding:14px}.modal.show{display:flex}.modalCard{background:#fff;width:min(620px,100%);border-radius:22px;padding:18px;box-shadow:0 18px 60px rgba(0,0,0,.25)}@media(max-width:760px){.grid{grid-template-columns:repeat(2,1fr)}.listrow{grid-template-columns:1fr}.calendar{gap:5px}.day{min-height:68px;padding:6px}.tabs{overflow-x:auto}.tab{min-width:120px}.wrap{padding-bottom:105px}}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<body>
<div class="version">v6.0-parser-engine</div>
<header><div class="eyebrow">HealthOps Aeronautas</div><h1 id="pageTitle">Início operacional</h1><p id="pageSub">Parser por coordenadas: PDF → linhas visuais → 10 colunas essenciais → jornadas.</p></header>
<main class="wrap">
<section id="inicio" class="section active"></section>
<section id="escala" class="section"></section>
<section id="saude" class="section"></section>
<section id="medicacoes" class="section"></section>
<section id="relatorio" class="section"></section>
<section id="validacao" class="section"></section>
<section id="debug" class="section"></section>
</main>
<nav class="tabs" id="tabs"></nav>
<div class="modal" id="modal"><div class="modalCard"><div class="between"><h3 id="modalTitle">Detalhes</h3><button class="btn secondary small" id="modalClose">Fechar</button></div><div id="modalBody"></div></div></div>
<script>
'use strict';
const VERSION='v6.0-parser-engine';
const STORAGE_KEY='healthops.v6.state';
const WEEK=new Set(['Mon','Tue','Wed','Thu','Fri','Sat','Sun']);
const MONTHS={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
const DATE_RE=/^\d{2}-[A-Za-z]{3}-\d{4}$/;
const TIME_RE=/^\d{1,2}:\d{2}(?:\(\+\d+\))?$/;
const FLIGHT_RE=/^LA\d{4}$/;
const ACT_RE=/^(?:LA\d{4}|HSBE|HSB|ASB|DO|DR|VC|OFF|CBF|EMER|CRM\w*|R\d{3}|MCK|C\d+F?)$/;
const AIR_RE=/^[A-Z]{3}$/;
const OP_ACTIVITIES=new Set(['HSB','HSBE','ASB']);
const REST_ACTIVITIES=new Set(['DO','DR','VC','OFF']);
const state=loadState();
function defaultState(){return{tab:'inicio',imports:{},journeys:[],events:[],rows:[],debug:[],meds:[],medTaken:{},protocols:[],health:{}}}
function loadState(){try{return Object.assign(defaultState(),JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'))}catch{return defaultState()}}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));render()}
function debug(scope,msg,obj){state.debug.unshift({time:new Date().toLocaleTimeString(),scope,msg,obj:obj||null});state.debug=state.debug.slice(0,250);localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
function pad(n){return String(n).padStart(2,'0')}
function dmy(d){return d?`${pad(d.getDate())}/${pad(d.getMonth()+1)}`:'—'}
function iso(d){return d?`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`:''}
function fmtDT(d){return d?`${dmy(d)} ${pad(d.getHours())}:${pad(d.getMinutes())}`:'—'}
function hours(a,b){return a&&b?(b-a)/3600000:null}
function h1(v){return v==null||!isFinite(v)?'—':`${Number(v).toFixed(1)}h`}
function parseDateToken(s){const [dd,mmm,yyyy]=s.split('-');return new Date(+yyyy,MONTHS[mmm],+dd)}
function parsePairingBase(pair,currentDate){let m=String(pair||'').match(/\/(\d{2})(\d{2})(\d{2})\//);if(m)return new Date(2000+(+m[3]),+m[2]-1,+m[1]);return currentDate?new Date(currentDate):null}
function parseTimeToken(tok,base){if(!tok||!base)return null;const m=String(tok).match(/^(\d{1,2}):(\d{2})(?:\(\+(\d+)\))?$/);if(!m)return null;return new Date(base.getFullYear(),base.getMonth(),base.getDate()+(m[3]?+m[3]:0),+m[1],+m[2],0,0)}
function tokensClean(tokens){return tokens.filter(t=>t && !['Date','Pairing/Activity','Report','Item','Opt','Rank','WT','ACY','Rep','Dep','Arr','Deb','Debrief','FH','DH','SDC','A/C','Type','Hotel','Assignment','Comments','Roster','Report'].includes(t))}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
async function ensurePdf(){if(!window.pdfjsLib)throw new Error('PDF.js não carregou. Verifique conexão/cache.');pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'}
async function extractPdfRows(file){await ensurePdf();const buf=await file.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:buf}).promise;let all=[];for(let p=1;p<=pdf.numPages;p++){const page=await pdf.getPage(p);const content=await page.getTextContent();const items=content.items.map(it=>({x:it.transform[4],y:it.transform[5],str:String(it.str||'').trim()})).filter(it=>it.str);const candidates=[clusterRows(items,'x','y',true),clusterRows(items,'y','x',false)];const scored=candidates.map(rows=>({rows,score:scoreRows(rows)}));scored.sort((a,b)=>b.score-a.score);all.push(...scored[0].rows.map(r=>Object.assign(r,{page:p})));}return all}
function clusterRows(items,primary,secondary,desc){const body=items.filter(it=>it[primary]>40);body.sort((a,b)=>a[primary]-b[primary]);const clusters=[];const tol=14;for(const it of body){let c=clusters.find(c=>Math.abs(c.p-it[primary])<tol);if(!c){c={p:it[primary],items:[]};clusters.push(c)}c.items.push(it);c.p=(c.p*(c.items.length-1)+it[primary])/c.items.length;}return clusters.map(c=>{const sorted=c.items.slice().sort((a,b)=>desc?b[secondary]-a[secondary]:a[secondary]-b[secondary]);const tokens=sorted.map(it=>it.str).filter(Boolean);return{p:c.p,tokens,text:tokens.join(' ')}}).filter(r=>isUsefulRow(r.tokens));}
function isUsefulRow(tokens){const t=tokensClean(tokens);return t.some(x=>DATE_RE.test(x)||ACT_RE.test(x)||x.includes('/'))}
function scoreRows(rows){let n=0;for(const r of rows){const t=tokensClean(r.tokens);if(t.some(x=>DATE_RE.test(x)))n+=2;if(t.some(x=>FLIGHT_RE.test(x)))n+=3;if(t.some(x=>['HSB','HSBE','ASB','DO','DR','VC','OFF'].includes(x)))n+=2;if(t.some(x=>TIME_RE.test(x)))n+=1;if(t.some(x=>AIR_RE.test(x)))n+=1;}return n}
async function extractPlainText(file){if(file.type.includes('pdf')||file.name.toLowerCase().endsWith('.pdf')){const rows=await extractPdfRows(file);return rows.map(r=>r.text).join('\n')}return await file.text()}
function plainRows(text){return text.split(/\n+/).map(x=>({tokens:x.trim().split(/\s+/),text:x.trim(),p:0,page:0})).filter(r=>r.text)}
function parseRowsToEvents(rows){let currentDate=null,currentPairing='',pairingBase=null;const events=[];for(const row of rows){let toks=tokensClean(row.tokens).filter(t=>t!=='<==');if(!toks.length)continue;let dateIdx=toks.findIndex(t=>DATE_RE.test(t));if(dateIdx>=0){currentDate=parseDateToken(toks[dateIdx]);toks.splice(dateIdx,1)}toks=toks.filter(t=>!WEEK.has(t));const pairIdxs=[];toks.forEach((t,i)=>{if(t.includes('/')&&!DATE_RE.test(t))pairIdxs.push(i)});if(pairIdxs.length){const idxSet=new Set(pairIdxs);for(const i of pairIdxs){[i-2,i-1,i+1,i+2].forEach(j=>{if(j>=0&&j<toks.length&&(/JJCC/.test(toks[j])||/-P$/.test(toks[j])||/^\d{2}-P$/.test(toks[j])))idxSet.add(j)})}const parts=[...idxSet].sort((a,b)=>a-b).map(i=>toks[i]);currentPairing=parts.join('');pairingBase=parsePairingBase(currentPairing,currentDate);toks=toks.filter((_,i)=>!idxSet.has(i));}
 if(!pairingBase&&currentDate)pairingBase=new Date(currentDate);
 const actIdx=toks.findIndex(t=>ACT_RE.test(t));if(actIdx<0)continue;const activity=toks[actIdx];const pre=toks.slice(0,actIdx);let post=toks.slice(actIdx+1);const report=pre.find(t=>TIME_RE.test(t))||null;if(post[0]==='CC'||post[0]==='CCM')post.shift();let condition=null;if(post[0]==='OP'||post[0]==='PS'){condition=post.shift()}post=post.filter(t=>!['CC','CCM','OP','PS'].includes(t));const fields=post.filter(t=>AIR_RE.test(t)||TIME_RE.test(t));let origin=null,dep=null,destination=null,arrival=null,release=null;if(AIR_RE.test(fields[0]||''))origin=fields[0];if(TIME_RE.test(fields[1]||''))dep=fields[1];if(AIR_RE.test(fields[2]||''))destination=fields[2];if(TIME_RE.test(fields[3]||''))arrival=fields[3];for(const f of fields.slice(4)){if(TIME_RE.test(f)&&!f.startsWith('00:00')){release=f;break}}
 const base=pairingBase?new Date(pairingBase):(currentDate?new Date(currentDate):null);const ev={sourceRow:row.text,page:row.page,currentDate:currentDate?new Date(currentDate):null,pairing:currentPairing,base,reportTok:report,report:parseTimeToken(report,base),activity,condition,origin,depTok:dep,dep:parseTimeToken(dep,base),destination,arrTok:arrival,arr:parseTimeToken(arrival,base),releaseTok:release,release:parseTimeToken(release,base)};events.push(ev)}return events}
function buildJourneys(events){const journeys=[];let cur=null;function close(){if(cur){finalizeJourney(cur);journeys.push(cur);cur=null}}for(const e of events){if(REST_ACTIVITIES.has(e.activity)){close();continue}const isFlight=FLIGHT_RE.test(e.activity);const isStandalone=!isFlight || OP_ACTIVITIES.has(e.activity);const starts=!!e.report || !cur || isStandalone || (e.pairing&&cur&&e.pairing!==cur.pairing);if(starts){close();cur={id:`J${journeys.length+1}`,pairing:e.pairing,base:e.base,date:e.report?new Date(e.report):new Date(e.currentDate||e.base||Date.now()),report:e.report||e.dep||null,reportTok:e.reportTok,type:isFlight?'Jornada de voo':(OP_ACTIVITIES.has(e.activity)?'Reserva/Sobreaviso':'Programação'),events:[],flights:[]}}
 cur.events.push(e);if(isFlight)cur.flights.push(e);if(e.release){cur.release=e.release;cur.releaseTok=e.releaseTok}if(isStandalone&&!isFlight){cur.release=e.release||e.arr||null;cur.releaseTok=e.releaseTok||e.arrTok||null;close()}}
 close();journeys.sort((a,b)=>(a.report||a.date)-(b.report||b.date));for(let i=0;i<journeys.length;i++){journeys[i].nextReport=journeys[i+1]?.report||null;journeys[i].restOfficial=hours(journeys[i].release,journeys[i].nextReport)}return journeys}
function finalizeJourney(j){if(!j.release){const last=j.flights[j.flights.length-1];if(last?.arr){const intl=j.flights.some(f=>/^LA8/.test(f.activity));j.release=new Date(last.arr.getTime()+(intl?45:30)*60000);j.releaseEstimated=true}}
 j.date=j.report?new Date(j.report):new Date(j.date);j.flightHours=j.flights.reduce((s,f)=>s+(hours(f.dep,f.arr)||0),0);j.dutyHours=hours(j.report,j.release);j.steps=j.flights.length;j.isInternational=j.flights.some(f=>/^LA8/.test(f.activity));j.hotelEstimated=null;}
function parseAllRows(rows){const events=parseRowsToEvents(rows);const journeys=buildJourneys(events);return{events,journeys,rows}}
function monthKeyFromJourneys(journeys){const d=journeys.find(j=>j.report)?.report||new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}`}
async function importFiles(files){let rows=[];let imported=0;for(const file of [...files]){try{debug('import',`Lendo ${file.name}`);let fileRows;if(file.type.includes('pdf')||file.name.toLowerCase().endsWith('.pdf'))fileRows=await extractPdfRows(file);else fileRows=plainRows(await file.text());rows.push(...fileRows);imported++;debug('import',`${file.name}: ${fileRows.length} linhas visuais`,fileRows.slice(0,8).map(r=>r.text));}catch(e){debug('import',`Erro em ${file.name}`,String(e&&e.stack?e.stack:e))}}
 const parsed=parseAllRows(rows);state.rows=rows;state.events=parsed.events;state.journeys=parsed.journeys;const mk=monthKeyFromJourneys(parsed.journeys);state.imports[mk]={updated:new Date().toISOString(),files:imported,journeys:parsed.journeys.length};saveState();return parsed.journeys.length}
function classifyHotel(j){const h=j.restOfficial;if(h==null)return{cls:'gray',txt:'Recup. n/d'};if(h<10)return{cls:'red',txt:`Repouso ${h1(h)} · Crítico`};if(h<12)return{cls:'yellow',txt:`Repouso ${h1(h)} · Atenção`};return{cls:'green',txt:`Repouso ${h1(h)} · Adequado`}}
function render(){renderTabs();document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(state.tab)?.classList.add('active');const titles={inicio:['Início operacional','Resumo integrado da escala e dados de autocuidado.'],escala:['Escala operacional','Importação e leitura por jornadas.'],saude:['Saúde','Check-in de hidratação, cafeína, alimentação e treinos.'],medicacoes:['Medicações','Banco local e protocolos pessoais.'],relatorio:['Relatório','Resumo para análise própria e profissionais.'],validacao:['Validação','Linhas normalizadas, eventos e jornadas para teste do parser.'],debug:['Debug','Registros técnicos da aplicação.']};document.getElementById('pageTitle').textContent=titles[state.tab]?.[0]||'HealthOps';document.getElementById('pageSub').textContent=titles[state.tab]?.[1]||'';renderInicio();renderEscala();renderSaude();renderMedicacoes();renderRelatorio();renderValidacao();renderDebug()}
function renderTabs(){const tabs=[['inicio','Início'],['escala','Escala'],['saude','Saúde'],['medicacoes','Medicações'],['relatorio','Relatório'],['validacao','Validação'],['debug','Debug']];document.getElementById('tabs').innerHTML=tabs.map(([id,label])=>`<button class="tab ${state.tab===id?'active':''}" data-tab="${id}">${label}</button>`).join('');document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;saveState()})}
function renderInicio(){const totalFlight=state.journeys.reduce((s,j)=>s+(j.flightHours||0),0);const totalDuty=state.journeys.reduce((s,j)=>s+(j.dutyHours||0),0);document.getElementById('inicio').innerHTML=`<div class="grid"><div class="card"><h2>Jornadas</h2><div class="metric">${state.journeys.length}</div></div><div class="card"><h2>Tempo de voo</h2><div class="metric">${h1(totalFlight)}</div></div><div class="card"><h2>Jornada total</h2><div class="metric">${h1(totalDuty)}</div></div><div class="card"><h2>Importações</h2><div class="metric">${Object.keys(state.imports||{}).length}</div></div></div><div class="card"><h2>Próximas jornadas</h2>${state.journeys.slice(0,5).map(renderJourneyMini).join('')||'<p class="muted">Importe uma escala para iniciar.</p>'}</div>`}
function renderJourneyMini(j){return `<div class="listrow"><div><b>${dmy(j.date)}</b></div><div><b>${j.type}</b><br><span class="muted">Apres. ${fmtDT(j.report)} · Fim ${fmtDT(j.release)}${j.releaseEstimated?' estimado':''}</span></div><div>${h1(j.dutyHours)}</div><div>${h1(j.flightHours)}</div><div>${j.flights.map(f=>`<span class="pill blue" title="${esc(f.origin)} ${fmtDT(f.dep)} → ${esc(f.destination)} ${fmtDT(f.arr)}">${f.activity}${f.condition==='PS'?' PS':''}</span>`).join('') || j.events.map(e=>`<span class="pill yellow">${e.activity}</span>`).join('')}<br><span class="pill ${classifyHotel(j).cls}">${classifyHotel(j).txt}</span></div></div>`}
function renderEscala(){document.getElementById('escala').innerHTML=`<div class="card"><h2>Importar documentos operacionais</h2><p class="muted">Selecione um ou vários PDFs/TXT de escala publicada ou executada. O nome do arquivo é ignorado; a identificação é feita pelo conteúdo/layout.</p><input id="fileInput" type="file" multiple accept=".pdf,.txt,application/pdf,text/plain"><div class="row" style="margin-top:12px"><button class="btn" id="processBtn">Processar e salvar</button><button class="btn danger" id="clearBtn">Limpar importações</button></div><p id="status" class="muted">${state.journeys.length} jornadas processadas.</p></div><details open class="card"><summary>1. Jornada do mês</summary>${state.journeys.map(renderJourneyMini).join('')||'<p class="muted">Nenhuma jornada processada.</p>'}</details><details class="card"><summary>2. Calendário</summary>${renderCalendar()}</details><details class="card"><summary>3. Diárias estimadas</summary>${renderPerDiem()}</details>`;document.getElementById('processBtn').onclick=async()=>{const files=document.getElementById('fileInput').files;document.getElementById('status').textContent='Processando...';const n=await importFiles(files);document.getElementById('status').textContent=`${n} jornadas processadas.`};document.getElementById('clearBtn').onclick=()=>{state.journeys=[];state.events=[];state.rows=[];state.imports={};saveState()}}
function renderCalendar(){if(!state.journeys.length)return'<p class="muted">Sem dados.</p>';const d0=state.journeys[0].date;const y=d0.getFullYear(),m=d0.getMonth();const first=new Date(y,m,1);const start=new Date(y,m,1-first.getDay());let html=`<h2>${first.toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}</h2><div class="calendar">${['D','S','T','Q','Q','S','S'].map(d=>`<div class="dow">${d}</div>`).join('')}`;for(let i=0;i<42;i++){const d=new Date(start.getFullYear(),start.getMonth(),start.getDate()+i);const js=state.journeys.filter(j=>iso(j.date)===iso(d));html+=`<div class="day"><b>${d.getDate()}</b><br>${js.length?`<span class="tag flight">${js.length} jornada(s)</span>`:`<span class="tag none">Sem dados</span>`}</div>`}return html+'</div>'}
function renderPerDiem(){if(!state.journeys.length)return'<p class="muted">Sem dados.</p>';let items=[];for(const j of state.journeys){if(!j.flights.length)continue;const d=j.date;const wd=d.getDay();if(j.flights.some(f=>f.dep&&f.dep.getHours()<8&&iso(f.dep)===iso(d)))items.push([d,'Café']);if(j.flights.some(f=>f.dep&&f.dep.getHours()<=13&&f.arr&&f.arr.getHours()>=11))items.push([d,'Almoço']);if(j.flights.some(f=>f.dep&&f.dep.getHours()<=20&&f.arr&&f.arr.getHours()>=19))items.push([d,'Jantar']);if(j.flights.some(f=>f.dep&&f.dep.getHours()<=23&&f.arr&&f.arr.getHours()>=23))items.push([d,'Ceia']);}return items.length?items.map(([d,t])=>`<p><b>${dmy(d)}</b> · ${t}</p>`).join(''):'<p class="muted">Nenhuma diária estimada.</p>'}
function renderSaude(){document.getElementById('saude').innerHTML=`<div class="card"><h2>Check-in diário</h2><p class="muted">Módulo preservado. Próximo refinamento: cruzar check-in com jornadas validadas.</p><div class="grid"><label>Água (ml)<input class="input" type="number" step="250" value="0"></label><label>Cafeína<select class="input"><option>Expresso</option><option>Café médio</option><option>Energético</option></select></label></div></div>`}
async function loadMedCatalog(){try{return await (await fetch('./data/medications.json')).json()}catch{return[]}}
async function renderMedicacoes(){const el=document.getElementById('medicacoes');if(!state._medsCatalog)state._medsCatalog=await loadMedCatalog();const q='';el.innerHTML=`<div class="card"><h2>Medicações e suplementações</h2><p class="muted">Busca local por nome, princípio ativo, classe ou finalidade.</p><input class="input" id="medSearch" placeholder="Ex.: Rosuvastatina, Amoxicilina, Atentah"><div id="medList"></div></div>`;const search=document.getElementById('medSearch'), list=document.getElementById('medList');function update(){const v=search.value.toLowerCase();const meds=(state._medsCatalog||[]).filter(m=>!v||[m.name,m.active,m.class,m.purpose,m.type].some(x=>String(x||'').toLowerCase().includes(v))).slice(0,30);list.innerHTML=meds.map(m=>`<div class="medcard"><b>${esc(m.name)}</b> <span class="pill ${m.aviation==='compatível'?'green':m.aviation==='sensível'?'red':'yellow'}">${esc(m.aviation||'atenção')}</span><p class="muted">${esc(m.type)} · ${esc(m.purpose)} · ${esc(m.class)}</p><p>Doses: ${(m.doses||[]).map(esc).join(', ')||'—'}</p><p>Esquemas: ${(m.schemes||[]).map(esc).join(', ')||'—'}</p></div>`).join('')||'<p class="muted">Nenhum item encontrado.</p>'}search.oninput=update;update()}
function renderRelatorio(){document.getElementById('relatorio').innerHTML=`<div class="card"><h2>Relatório</h2><p class="muted">Resumo mensal será alimentado pelas jornadas validadas e pelos check-ins de saúde.</p></div>`}
function renderValidacao(){document.getElementById('validacao').innerHTML=`<div class="card"><h2>Validação do Parser</h2><p>Linhas visuais: <b>${state.rows.length}</b> · Eventos: <b>${state.events.length}</b> · Jornadas: <b>${state.journeys.length}</b></p><details><summary>Eventos extraídos</summary><pre>${esc(JSON.stringify(state.events.slice(0,60).map(e=>({date:e.currentDate&&iso(e.currentDate),pairing:e.pairing,report:e.reportTok,activity:e.activity,condition:e.condition,origin:e.origin,dep:e.depTok,dest:e.destination,arr:e.arrTok,release:e.releaseTok})),null,2))}</pre></details><details><summary>Linhas normalizadas</summary><pre>${esc(state.rows.slice(0,120).map(r=>r.text).join('\n'))}</pre></details></div>`}
function renderDebug(){document.getElementById('debug').innerHTML=`<div class="card"><h2>Debug</h2><pre>${esc(state.debug.map(d=>`[${d.time}] ${d.scope}: ${d.msg}\n${d.obj?JSON.stringify(d.obj,null,2):''}`).join('\n\n'))}</pre></div>`}
document.getElementById('modalClose').onclick=()=>document.getElementById('modal').classList.remove('show');
if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
render();
</script>
</body>
